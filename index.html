<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="案件一覧、クライアント管理、収益ダッシュボードをひとつにまとめて運用できる案件管理システムです。">
  <meta name="application-name" content="案件管理システム">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="案件管理システム">
  <meta name="theme-color" content="#f5f6f8">
  <meta name="color-scheme" content="light">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:site_name" content="案件管理システム">
  <meta property="og:title" content="案件管理システム">
  <meta
    property="og:description"
    content="案件一覧、クライアント管理、ダッシュボード分析をひとつにまとめた案件管理システムです。">
  <meta name="twitter:card" content="summary">
  <title>案件管理システム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #f5f6f8;
      --white: #ffffff;
      --surface: #f0f2f5;
      --border: #d1d5db;
      --border-strong: #9ca3af;
      --txt: #111827;
      --txt2: #6b7280;
      --txt3: #9ca3af;
      --acc: #111827;
      --acc2: #1f2937;
      --green: #059669;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.07), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 18px 44px rgba(17, 24, 39, 0.12);
      --radius: 24px;
      --radius-sm: 10px;
      --sans: "Noto Sans JP", sans-serif;
      --mono: "JetBrains Mono", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(17, 24, 39, 0.06), transparent 34%),
        radial-gradient(circle at bottom right, rgba(5, 150, 105, 0.08), transparent 28%),
        linear-gradient(180deg, #f7f8fa 0%, var(--bg) 100%);
      color: var(--txt);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .app-shell {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .app-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      transition: opacity 320ms ease;
    }

    .app-frame.is-ready {
      opacity: 1;
    }

    .loader-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, rgba(247, 248, 250, 0.94), rgba(245, 246, 248, 0.98));
      transition: opacity 320ms ease, visibility 320ms ease;
    }

    .loader-overlay.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-card {
      width: min(100%, 420px);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--white);
      color: var(--txt3);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .loader-title {
      margin: 18px 0 8px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .loader-text {
      margin: 0;
      color: var(--txt2);
      font-size: 14px;
      line-height: 1.75;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
    }

    .status-label {
      color: var(--txt3);
      font-size: 12px;
    }

    .status-code {
      color: var(--txt3);
      font-family: var(--mono);
      font-size: 12px;
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 10px;
      margin-top: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(156, 163, 175, 0.18);
    }

    .progress-track::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 38%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--acc), var(--green));
      animation: slide-progress 1.25s ease-in-out infinite;
    }

    .loader-hint {
      margin-top: 14px;
      color: var(--txt3);
      font-size: 12px;
      line-height: 1.65;
    }

    .support-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .action-btn:hover {
      transform: translateY(-1px);
    }

    .action-btn-primary {
      background: var(--acc);
      border-color: var(--acc);
      color: var(--white);
    }

    .action-btn-primary:hover {
      background: var(--acc2);
      border-color: var(--acc2);
    }

    .action-btn-secondary {
      background: var(--white);
      border-color: var(--border-strong);
      color: var(--txt);
    }

    .action-btn-secondary:hover {
      background: var(--surface);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes slide-progress {
      0% {
        transform: translateX(-120%);
      }

      100% {
        transform: translateX(320%);
      }
    }

    @media (max-width: 520px) {
      .loader-overlay {
        padding: 16px;
      }

      .loader-card {
        padding: 22px;
      }

      .loader-title {
        font-size: 24px;
      }
    }
  </style>

  <noscript>
    <style>
      .loader-overlay {
        display: none;
      }

      .app-frame {
        opacity: 1;
      }
    </style>
  </noscript>
</head>
<body>
  <div class="app-shell">
    <div id="loader" class="loader-overlay" aria-live="polite" aria-busy="true">
      <div class="loader-card" role="status">
        <div class="badge">Case Manage</div>
        <h1 class="loader-title">案件管理システム</h1>
        <p id="loaderText" class="loader-text">
          画面を準備しています。<br>
          数秒お待ちください。
        </p>

        <div class="status-row" aria-hidden="true">
          <div class="status-label">アプリ起動中</div>
          <div id="progressLabel" class="status-code">booting</div>
        </div>
        <div class="progress-track" aria-hidden="true"></div>

        <div id="loaderHint" class="loader-hint">
          初回アクセス時は、表示まで少し時間がかかることがあります。
        </div>

        <div id="supportActions" class="support-actions" hidden>
          <a
            class="action-btn action-btn-primary"
            href="https://script.google.com/macros/s/AKfycbyBwuy6Mpys_NsC_yVmcjN2m5hKXe0ixsAHgrU3VngfIGnAsMzCbJeJt-Qk4-WsPXmA/exec"
            target="_blank"
            rel="noreferrer">
            アプリを直接開く
          </a>
          <button id="retryButton" class="action-btn action-btn-secondary" type="button">再読み込み</button>
        </div>

        <span class="sr-only">アプリケーションを読み込んでいます</span>
      </div>
    </div>

    <iframe
      id="appFrame"
      class="app-frame"
      src="https://script.google.com/macros/s/AKfycbyBwuy6Mpys_NsC_yVmcjN2m5hKXe0ixsAHgrU3VngfIGnAsMzCbJeJt-Qk4-WsPXmA/exec"
      referrerpolicy="strict-origin-when-cross-origin"
      title="案件管理システム">
    </iframe>
  </div>

  <script>
    const frame = document.getElementById("appFrame");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loaderText");
    const loaderHint = document.getElementById("loaderHint");
    const progressLabel = document.getElementById("progressLabel");
    const supportActions = document.getElementById("supportActions");
    const retryButton = document.getElementById("retryButton");

    let settled = false;

    function finishLoading() {
      if (settled) return;
      settled = true;

      frame.classList.add("is-ready");
      loader.classList.add("is-hidden");
      loader.setAttribute("aria-busy", "false");

      window.setTimeout(() => {
        loader.remove();
      }, 360);
    }

    function showSlowState() {
      if (settled) return;

      progressLabel.textContent = "waiting";
      loaderText.innerHTML = "読み込みに少し時間がかかっています。<br>通信状況をご確認いただくか、直接アプリを開いてください。";
      loaderHint.textContent = "通信状況やログイン確認の状況によって、表示まで時間がかかることがあります。";
      supportActions.hidden = false;
    }

    frame.addEventListener("load", () => {
      window.setTimeout(finishLoading, 180);
    });

    frame.addEventListener("error", showSlowState);
    retryButton.addEventListener("click", () => window.location.reload());

    window.setTimeout(showSlowState, 6500);
  </script>
</body>
</html>
