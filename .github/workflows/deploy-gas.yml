name: Deploy GAS

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - ".github/workflows/deploy-gas.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-gas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GAS_SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}
      GAS_WEBAPP_DEPLOYMENT_ID: ${{ secrets.GAS_WEBAPP_DEPLOYMENT_ID }}
      GAS_DEPLOYMENT_ID_LEGACY: ${{ secrets.GAS_DEPLOYMENT_ID }}
      GAS_CLASPRC_JSON: ${{ secrets.GAS_CLASPRC_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$GAS_SCRIPT_ID" || { echo "GAS_SCRIPT_ID is not set."; exit 1; }
          test -n "$GAS_CLASPRC_JSON" || { echo "GAS_CLASPRC_JSON is not set."; exit 1; }

          if [ -n "$GAS_WEBAPP_DEPLOYMENT_ID" ]; then
            echo "GAS_TARGET_DEPLOYMENT_ID=$GAS_WEBAPP_DEPLOYMENT_ID" >> "$GITHUB_ENV"
          elif [ -n "$GAS_DEPLOYMENT_ID_LEGACY" ]; then
            echo "Using legacy secret GAS_DEPLOYMENT_ID. Rename it to GAS_WEBAPP_DEPLOYMENT_ID to make the target type explicit."
            echo "GAS_TARGET_DEPLOYMENT_ID=$GAS_DEPLOYMENT_ID_LEGACY" >> "$GITHUB_ENV"
          else
            echo "Either GAS_WEBAPP_DEPLOYMENT_ID or GAS_DEPLOYMENT_ID must be set."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Write clasp credentials
        shell: bash
        run: |
          printf '%s\n' "$GAS_CLASPRC_JSON" > "$HOME/.clasprc.json"

      - name: Write clasp project config
        shell: bash
        run: |
          cat > .clasp.json <<EOF
          {
            "scriptId": "$GAS_SCRIPT_ID",
            "rootDir": "src"
          }
          EOF

      - name: Verify target deployment is a Web App
        run: node scripts/verify-gas-webapp-deployment.mjs

      - name: Show Apps Script file status
        run: npx clasp show-file-status

      - name: Push src to Apps Script
        run: npx clasp push --force

      - name: Update web app deployment
        run: npx clasp update-deployment "$GAS_TARGET_DEPLOYMENT_ID" --description "GitHub Actions ${GITHUB_SHA}"

      - name: Show deployed Web App URL
        run: node scripts/verify-gas-webapp-deployment.mjs
