name: Deploy GAS

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - ".github/workflows/deploy-gas.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-gas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GAS_SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}
      GAS_WEBAPP_DEPLOYMENT_ID: ${{ secrets.GAS_WEBAPP_DEPLOYMENT_ID }}
      GAS_CLASPRC_JSON: ${{ secrets.GAS_CLASPRC_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$GAS_SCRIPT_ID" || { echo "GAS_SCRIPT_ID is not set."; exit 1; }
          test -n "$GAS_WEBAPP_DEPLOYMENT_ID" || { echo "GAS_WEBAPP_DEPLOYMENT_ID is not set."; exit 1; }
          test -n "$GAS_CLASPRC_JSON" || { echo "GAS_CLASPRC_JSON is not set."; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Write clasp credentials
        shell: bash
        run: |
          printf '%s\n' "$GAS_CLASPRC_JSON" > "$HOME/.clasprc.json"

      - name: Write clasp project settings
        shell: bash
        run: |
          cat > .clasp.json <<'EOF'
          {
            "scriptId": "__SCRIPT_ID__",
            "rootDir": "src"
          }
          EOF
          sed -i "s/__SCRIPT_ID__/$GAS_SCRIPT_ID/" .clasp.json

      - name: Verify Web App deployment
        run: npm run gas:verify:webapp

      - name: Deploy Web App
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: npm run gas:deploy:webapp
