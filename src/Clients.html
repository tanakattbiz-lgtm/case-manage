<section class="view" id="view-clients" data-view-panel="clients">
  <div class="view-header">
    <div>
      <div class="overline">顧客</div>
      <h2>クライアント管理</h2>
      <p>顧客情報の検索と確認ができます。</p>
    </div>
    <div class="toolbar-row">
      <button class="btn btn-secondary" type="button" data-action="reload-clients">
        <svg class="icon icon-16" aria-hidden="true"><use href="#icon-refresh"></use></svg>
        <span>再取得</span>
      </button>
    </div>
  </div>

  <div class="split-main">
      <section class="surface section-card">
        <div class="section-head">
          <div>
            <h3>検索条件</h3>
            <p>名称、担当者、連絡先で絞り込みできます。</p>
          </div>
        </div>
        <form id="clientsFilterForm" class="filter-form">
          <div class="field-grid field-grid-2">
            <label class="field">
              <span class="field-label">キーワード</span>
              <input class="input" type="search" id="clientQuery" placeholder="クライアント名、担当者、メール">
            </label>
            <label class="field">
              <span class="field-label">絞り込み状態</span>
              <div class="filter-chip-list" id="clientsFilterChips"></div>
            </label>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">
              <svg class="icon icon-16" aria-hidden="true"><use href="#icon-search"></use></svg>
              <span>検索する</span>
            </button>
            <button class="btn btn-secondary" type="button" data-action="reset-client-filters">条件をクリア</button>
          </div>
        </form>
      </section>

      <section class="surface section-card">
        <div class="section-head">
          <div>
            <h3>検索結果</h3>
            <p id="clientsSummary">読み込み中です。</p>
          </div>
          <div class="toolbar-row">
            <label class="field compact-field">
              <span class="field-label">件数</span>
              <select class="select" id="clientsPageSize">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="50">50</option>
              </select>
            </label>
          </div>
        </div>

        <div class="desktop-only">
          <div class="client-list-table" id="clientsTableBody"></div>
        </div>
        <div class="mobile-card-list mobile-only" id="clientsMobileList"></div>
        <div class="pager" id="clientsPager"></div>
      </section>
  </div>
</section>
