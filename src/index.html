<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>案件管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent
        }

        :root {
            --bg: #f5f6f8;
            --white: #ffffff;
            --s1: #f0f2f5;
            --s2: #e4e7ec;
            --border: #d1d5db;
            --border2: #9ca3af;
            --txt: #111827;
            --txt2: #6b7280;
            --txt3: #9ca3af;
            --acc: #111827;
            --acc2: #1f2937;
            --green: #059669;
            --green-lt: #ecfdf5;
            --green-bd: #a7f3d0;
            --blue: #1d4ed8;
            --blue-lt: #eff6ff;
            --blue-bd: #bfdbfe;
            --amber: #b45309;
            --amber-lt: #fffbeb;
            --amber-bd: #fde68a;
            --red: #dc2626;
            --red-lt: #fef2f2;
            --red-bd: #fecaca;
            --gray-lt: #f9fafb;
            --radius: 10px;
            --rsm: 8px;
            --rmd: 6px;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Noto Sans JP', sans-serif;
            --sh: 0 1px 3px rgba(0, 0, 0, .07), 0 1px 2px rgba(0, 0, 0, .04);
            --sh2: 0 4px 16px rgba(0, 0, 0, .1);
            --nh: 60px;
            --bnah: 52px;
            --th: 54px;
            --sb: 228px;
        }

        html {
            overflow: hidden;
            height: 100%;
            min-height: 100dvh
        }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: var(--sans);
            font-size: 15px;
            height: 100%;
            min-height: 100dvh;
            overflow: hidden;
            overscroll-behavior-x: none;
            -webkit-font-smoothing: antialiased
        }

        .ico {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .ico svg {
            display: block
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            min-height: 100dvh;
        }

        .app {
            display: flex;
            height: 100%;
            min-height: 100dvh;
            width: 100%;
            overflow: hidden;
            background: var(--bg)
        }

        .sidebar {
            width: var(--sb);
            background: var(--white);
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            display: none;
            flex-direction: column;
            padding: 20px 12px 20px;
            z-index: 200;
            box-shadow: var(--sh)
        }

        .sb-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            margin-bottom: 28px;
            font-size: 15px;
            font-weight: 700;
            color: var(--acc);
            letter-spacing: -.01em
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 12px;
            border-radius: var(--rsm);
            border: none;
            background: none;
            color: var(--txt2);
            font-family: var(--sans);
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 3px;
            transition: all .15s;
            text-align: left;
            line-height: 1
        }

        .nav-btn:hover {
            background: var(--s1);
            color: var(--txt)
        }

        .nav-btn.active {
            background: var(--acc);
            color: #fff;
            font-weight: 500
        }

        .nav-btn .nav-ic {
            width: 18px;
            flex-shrink: 0
        }

        .nav-btn .nav-label {
            flex: 1
        }

        .nav-badge {
            background: var(--s2);
            color: var(--txt2);
            font-size: 11px;
            font-family: var(--mono);
            padding: 1px 7px;
            border-radius: 20px;
            font-weight: 500;
            min-width: 24px;
            text-align: center
        }

        .nav-btn.active .nav-badge {
            background: rgba(255, 255, 255, .2);
            color: #fff
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0
        }

        .topbar {
            min-height: var(--th);
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            padding: 10px 12px;
            flex-shrink: 0;
            box-shadow: var(--sh);
            gap: 10px;
        }

        .topbar-title {
            font-size: 17px;
            font-weight: 700;
            min-width: 0;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 20px;
            padding-bottom: calc(var(--nh) + var(--bnah) + 20px + env(safe-area-inset-bottom));
            background: var(--bg)
        }

        .view {
            display: none
        }

        .view.active {
            display: block;
            animation: fadeUp .18s ease
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(5px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 0 18px;
            height: 40px;
            border-radius: var(--rsm);
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-family: var(--sans);
            font-weight: 500;
            transition: all .15s;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
            line-height: 1
        }

        .btn:active {
            transform: scale(.97)
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none !important
        }

        .btn-primary {
            background: var(--acc);
            color: #fff;
            border-color: var(--acc)
        }

        .btn-primary:hover {
            background: var(--acc2)
        }

        .btn-outline {
            background: var(--white);
            color: var(--txt);
            border-color: var(--border2)
        }

        .btn-outline:hover {
            background: var(--s1)
        }

        .btn-ghost {
            background: transparent;
            color: var(--txt2);
            border-color: transparent
        }

        .btn-ghost:hover {
            background: var(--s1);
            color: var(--txt)
        }

        .btn-danger {
            background: transparent;
            color: var(--red);
            border-color: var(--red-bd)
        }

        .btn-danger:hover {
            background: var(--red-lt)
        }

        .btn-sm {
            height: 34px;
            padding: 0 12px;
            font-size: 13px
        }

        .btn-xs {
            height: 28px;
            padding: 0 10px;
            font-size: 12px
        }

        .btn-icon {
            width: 40px;
            padding: 0
        }

        .btn-icon-sm {
            width: 34px;
            height: 34px;
            padding: 0
        }

        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(var(--nh) + var(--bnah) + env(safe-area-inset-bottom));
            padding-bottom: env(safe-area-inset-bottom);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            z-index: 500;
            flex-direction: column;
            justify-content: flex-end
        }

        .bn-actions {
            display: flex;
            gap: 8px;
            min-height: var(--bnah);
            padding: 8px 10px 6px;
            border-bottom: 1px solid var(--border);
        }

        .mobile-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            flex: 1 1 0;
            min-width: 0;
            padding: 4px 2px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--white);
            color: var(--txt2);
            font-family: var(--sans);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            line-height: 1.1;
            transition: all .15s;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-action-btn:active {
            transform: scale(.97);
        }

        .mobile-action-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .mobile-action-btn span {
            display: block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mobile-action-btn.primary {
            background: var(--acc);
            border-color: var(--acc);
            color: #fff;
        }

        .bn-inner {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            height: var(--nh);
            width: 100%
        }

        .bnav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            background: none;
            border: none;
            color: var(--txt3);
            font-family: var(--sans);
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
            padding: 4px 0;
            white-space: nowrap;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent
        }

        .bnav-btn svg {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
        }

        .bnav-btn.active {
            color: var(--acc)
        }

        .sk {
            background: linear-gradient(90deg, var(--s1) 25%, var(--s2) 50%, var(--s1) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px
        }

        @keyframes shimmer {
            from {
                background-position: 200%
            }

            to {
                background-position: -200%
            }
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--sh)
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px
        }

        .kpi-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: var(--sh);
            position: relative;
            overflow: hidden
        }

        .kpi-tag {
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%
        }

        .kpi-lbl {
            font-size: 11px;
            color: var(--txt2);
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
            letter-spacing: .04em
        }

        .kpi-val {
            font-family: var(--mono);
            font-size: 20px;
            font-weight: 500;
            color: var(--txt);
            line-height: 1;
            margin-bottom: 3px
        }

        .kpi-sub {
            font-size: 11px;
            color: var(--txt3)
        }

        .chart-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--sh);
            margin-bottom: 14px
        }

        .chart-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px
        }

        .chart-title {
            font-size: 13px;
            font-weight: 700
        }

        .chart-legend {
            display: flex;
            gap: 14px
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--txt2)
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .chart-svg-wrap {
            width: 100%;
            position: relative
        }

        .chart-svg {
            width: 100%;
            overflow: visible;
            display: block
        }

        .chart-x-labels {
            display: none;
        }

        .chart-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .chart-canvas-wrap {
            position: relative;
            width: 100%;
            height: 220px;
            margin-top: 10px;
        }

        .chart-canvas-wrap.circle-chart {
            height: 260px;
            max-width: 420px;
            margin: 10px auto 0;
        }


        .dash-summary-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }

        .insight-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--sh);
            padding: 16px;
        }

        .insight-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .insight-list {
            display: grid;
            gap: 8px;
        }

        .insight-item {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            font-size: 13px;
            color: var(--txt2);
            line-height: 1.5;
        }

        .insight-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--acc);
            margin-top: 6px;
            flex-shrink: 0;
        }

        .mini-kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .mini-kpi {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: var(--rsm);
            padding: 10px 12px;
        }

        .mini-kpi-label {
            font-size: 11px;
            color: var(--txt3);
            margin-bottom: 4px;
        }

        .mini-kpi-value {
            font-size: 14px;
            font-family: var(--mono);
            color: var(--txt);
            font-weight: 500;
        }

        .section-spacer {
            margin-top: 4px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }


        .dash-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        .dash-summary-card {
            width: 100%;
        }

        .adv-search {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .adv-search-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .adv-search-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        @media(min-width:850px) {
            .adv-search-row {
                grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr;
            }
        }

        .status-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 14px
        }

        .s-chip {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 10px;
            text-align: center;
            box-shadow: var(--sh);
            cursor: pointer;
            transition: all .15s;
            user-select: none;
            -webkit-user-select: none
        }

        .s-chip:hover {
            border-color: var(--acc);
            box-shadow: var(--sh2);
            transform: translateY(-1px)
        }

        .s-chip:active {
            transform: scale(.97);
            box-shadow: var(--sh)
        }

        .s-chip-cnt {
            font-family: var(--mono);
            font-size: 22px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px
        }

        .s-chip-lbl {
            font-size: 11px
        }

        .ranking-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--sh);
            overflow: hidden;
            margin-bottom: 14px
        }

        .ranking-hdr {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px
        }

        .ranking-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            border-bottom: 1px solid var(--border);
            transition: background .1s
        }

        .ranking-row:last-child {
            border-bottom: none
        }

        .ranking-row:hover {
            background: var(--s1)
        }

        .rank-num {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--txt3);
            width: 16px;
            text-align: right;
            flex-shrink: 0
        }

        .rank-num.top {
            color: var(--amber);
            font-weight: 700
        }

        .rank-name {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0
        }

        .rank-bar-wrap {
            width: 80px;
            height: 5px;
            background: var(--s2);
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0
        }

        .rank-bar {
            height: 100%;
            border-radius: 3px;
            background: var(--acc)
        }

        .rank-val {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--txt2);
            width: 80px;
            text-align: right;
            flex-shrink: 0
        }

        .rank-mg {
            font-size: 11px;
            width: 38px;
            text-align: right;
            flex-shrink: 0
        }

        .recent-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--sh);
            overflow: hidden
        }

        .recent-hdr {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 700
        }

        .recent-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            border-bottom: 1px solid var(--border);
            transition: background .1s
        }

        .recent-row:last-child {
            border-bottom: none
        }

        .recent-row:hover {
            background: var(--s1)
        }

        .rr-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .rr-info {
            flex: 1;
            min-width: 0
        }

        .rr-name {
            font-size: 13px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .rr-client {
            font-size: 12px;
            color: var(--txt2);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .rr-right {
            text-align: right;
            flex-shrink: 0
        }

        .rr-sales {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--txt)
        }

        .rr-margin {
            font-size: 11px;
            color: var(--txt3)
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            line-height: 1.4;
            white-space: nowrap
        }

        .b-商談中 {
            background: var(--amber-lt);
            color: var(--amber);
            border: 1px solid var(--amber-bd)
        }

        .b-進行中 {
            background: var(--green-lt);
            color: var(--green);
            border: 1px solid var(--green-bd)
        }

        .b-完了 {
            background: var(--blue-lt);
            color: var(--blue);
            border: 1px solid var(--blue-bd)
        }

        .b-停止 {
            background: var(--red-lt);
            color: var(--red);
            border: 1px solid var(--red-bd)
        }

        .b-保留 {
            background: var(--s1);
            color: var(--txt2);
            border: 1px solid var(--border)
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap
        }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px
        }

        @media(max-width:500px) {
            .search-wrap {
                min-width: 100%;
                order: 1
            }

            .filter-sel {
                flex: 1;
                order: 2
            }
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--txt3);
            z-index: 3
        }

        .search-input {
            width: 100%;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--rsm);
            padding: 0 10px 0 44px !important;
            color: var(--txt);
            font-size: 15px;
            font-family: var(--sans);
            outline: none;
            height: 42px;
            transition: border-color .15s;
            box-shadow: var(--sh);
            display: block;
            position: relative;
            z-index: 2
        }

        .search-input:focus {
            border-color: var(--acc)
        }

        .filter-sel {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--rsm);
            padding: 0 28px 0 12px;
            color: var(--txt);
            font-size: 14px;
            font-family: var(--sans);
            outline: none;
            height: 42px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            box-shadow: var(--sh);
            flex-shrink: 0;

                flex-direction: column;
            }

            .cli-inline-actions .btn,
            .form-actions .btn {
                width: 100%;
            }

            .modal-sheet {
                max-height: 100dvh;
            }
        }

        @media(min-width:850px) {
            .topbar {
                height: var(--th);
                min-height: 0;
                padding: 0 20px;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }
            .topbar-title {
                font-size: 17px;
                flex: 1 1 auto;
            }
            .topbar-actions {
                display: flex !important;
                align-items: center;
                justify-content: flex-end;
                width: auto;
            }
            .topbar-actions .btn {
                width: auto;
                flex: 0 0 auto;
                padding: 0 18px;
                font-size: 14px;
            }
            .topbar-actions .user-chip {
                grid-column: auto;
                flex: 0 0 auto;
            }
            .user-chip {
                min-width: 150px;
            }
            .sidebar { display: flex !important; width: 240px; }
            .bottom-nav { display: none !important; }
            .fab { display: none !important; }
            .topbar-actions .btn-primary { display: flex !important; }
            .desk-table { display: block !important; }
            .mob-only { display: none !important; }

            .content-area { padding: 24px; }
            .kpi-grid { grid-template-columns: repeat(3, 1fr); }
            .status-row { grid-template-columns: repeat(5, 1fr); }
            .form-2col, .cli-inline-grid { grid-template-columns: 1fr 1fr; }
            .clients-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
            .chart-row { grid-template-columns: 1fr 1fr; gap: 14px; }
            .chart-canvas-wrap.circle-chart { height: 300px; max-width: 460px; }
            .dash-summary-grid { grid-template-columns: 1fr; }
            .mini-kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-sheet { width: min(90vw, 560px); border-radius: 14px; margin: auto; }
            .sh-handle { display: none; }
            .modal-ov { align-items: center; }
        }


        @media(min-width:850px) {
            .dash-summary-grid,
            .dash-stack > .dash-summary-grid {
                grid-template-columns: 1fr !important;
            }
        }

        @media(min-width:1100px) {
            .kpi-grid { grid-template-columns: repeat(6, 1fr); }
        }

        @media(max-width:400px) {
            .status-row { grid-template-columns: repeat(2, 1fr); }
            .kpi-grid { grid-template-columns: 1fr; }
        }

    <div class="toast-wrap" id="toastWrap"></div>

    <script>
        'use strict';

        const TOKEN_STORAGE_KEY = 'case-manage.auth.token';
        const DEFAULT_AUTH_SETTINGS = {
            passwordMinLength: 10,
            maxFailedAttempts: 5,
            lockoutMinutes: 15,
            sessionTtlMinutes: 480,
            roles: {
                admin: '管理者',
                editor: '編集者',
                viewer: '閲覧者',
            }
        };

        let authState = {
            token: '',
            user: null,
            permissions: { role: 'viewer', roleLabel: '閲覧者', canView: false, canEdit: false, canManageUsers: false },
            session: null,
            settings: { ...DEFAULT_AUTH_SETTINGS },
        };
        let allProjects = [];
        let allClients = [];
        let allUsers = [];
        let auditLogs = [];
        const AUDIT_LOG_DISPLAY_OPTIONS = [20, 50, 100, 120];
        let auditLogDisplayCount = AUDIT_LOG_DISPLAY_OPTIONS[0];
        let loaded = false;
        let currentView = 'dashboard';
        let dashboardFilter = getDefaultDashboardFilter();
        let dashboardCharts = [];
        let authRevision = 0;
        let loadRevision = 0;
        let projectViewBaseList = null;
        let projectViewLabel = '';

        const fmt = n => '¥' + Math.round(Number(n) || 0).toLocaleString('ja-JP');
        const pct = n => Math.round(Number(n) || 0) + '%';
        const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        const date2input = d => d ? d.split(' ')[0].replace(/\//g, '-') : '';
        const input2date = v => v ? v.replace(/-/g, '/') : '';

        function bumpAuthRevision() {
            authRevision += 1;
            return authRevision;
        }

        function invalidateLoads() {
            loadRevision += 1;
            return loadRevision;
        }

        function isCurrentAuthSnapshot(snapshot) {
            return Boolean(snapshot)
                && snapshot.revision === authRevision
                && snapshot.token === authState.token;
        }

        function cloneAuthSettings(settings) {
            return {
                ...DEFAULT_AUTH_SETTINGS,
                ...(settings || {}),
                roles: {
                    ...DEFAULT_AUTH_SETTINGS.roles,
                    ...((settings && settings.roles) || {})
                }
            };
        }

        function normalizeAuditLogDisplayCount(value) {
            const normalized = Number(value);
            return AUDIT_LOG_DISPLAY_OPTIONS.includes(normalized)
                ? normalized
                : AUDIT_LOG_DISPLAY_OPTIONS[0];
        }

        function getVisibleAuditLogs() {
            return auditLogs.slice(0, normalizeAuditLogDisplayCount(auditLogDisplayCount));
        }

        function getStoredToken() {
            try {
                return localStorage.getItem(TOKEN_STORAGE_KEY) || '';
            } catch (e) {
                return '';
            }
        }

        function setStoredToken(token) {
            try {
                if (token) localStorage.setItem(TOKEN_STORAGE_KEY, token);
                else localStorage.removeItem(TOKEN_STORAGE_KEY);
            } catch (e) {}
        }

        function normalizeServerError(err) {
            const raw = String((err && err.message) || err || '不明なエラーが発生しました。');
            const idx = raw.indexOf(':');
            if (idx > 0) {
                return {
                    code: raw.slice(0, idx).trim(),
                    message: raw.slice(idx + 1).trim() || raw,
                    raw,
                };
            }
            return { code: 'APP_ERROR', message: raw, raw };
        }

        function isAuthenticated() {
            return Boolean(authState.user && authState.token);
        }

        function canEdit() {
            return Boolean(authState.permissions && authState.permissions.canEdit);
        }

        function canManageUsers() {
            return Boolean(authState.permissions && authState.permissions.canManageUsers);
        }

        function getUserAgent() {
            return navigator.userAgent || '';
        }

        function showAuthMessage(message, type = '') {
            const el = document.getElementById('authMessage');
            if (!el) return;
            el.className = `auth-note${type ? ' ' + type : ''}`;
            el.textContent = message;
        }

        function renderAuthMeta() {
            const meta = document.getElementById('authMeta');
            if (!meta) return;
            meta.innerHTML = `
                <div class="auth-meta-chip">最小 ${authState.settings.passwordMinLength} 文字</div>
                <div class="auth-meta-chip">失敗 ${authState.settings.maxFailedAttempts} 回で ${authState.settings.lockoutMinutes} 分ロック</div>
                <div class="auth-meta-chip">セッション ${Math.round(authState.settings.sessionTtlMinutes / 60)} 時間</div>
            `;
        }

        function setAuthMode(mode) {
            const loginForm = document.getElementById('loginForm');
            const setupForm = document.getElementById('setupForm');
            const title = document.getElementById('authTitle');
            const subtitle = document.getElementById('authSubtitle');

            loginForm.hidden = mode !== 'login';
            setupForm.hidden = mode !== 'setup';

            if (mode === 'setup') {
                title.textContent = '初回セットアップ';
                subtitle.textContent = '最初の管理者アカウントを作成して、ユーザー管理を開始します。';
                showAuthMessage('まだユーザーが存在しません。最初の管理者を作成してください。');
                setTimeout(() => document.getElementById('setupName')?.focus(), 60);
                return;
            }

            if (mode === 'loading') {
                title.textContent = '認証状態を確認中';
                subtitle.textContent = 'セキュアセッションを確認しています。しばらくお待ちください。';
                showAuthMessage('認証情報を確認中です...');
                return;
            }

            title.textContent = 'ログイン';
            subtitle.textContent = 'メールアドレスとパスワードでログインしてください。';
            showAuthMessage('メールアドレスとパスワードを入力してください。');
            setTimeout(() => document.getElementById('loginEmail')?.focus(), 60);
        }

        function showAuthShell() {
            document.getElementById('authShell').hidden = false;
            document.getElementById('appShell').hidden = true;
        }

        function showAppShell() {
            document.getElementById('authShell').hidden = true;
            document.getElementById('appShell').hidden = false;
        }

        function resetAuthState() {
            authState = {
                token: '',
                user: null,
                permissions: { role: 'viewer', roleLabel: '閲覧者', canView: false, canEdit: false, canManageUsers: false },
                session: null,
                settings: cloneAuthSettings(authState.settings),
            };
            bumpAuthRevision();
            invalidateLoads();
            setStoredToken('');
            allProjects = [];
            allClients = [];
            allUsers = [];
            auditLogs = [];
            loaded = false;
            projectViewBaseList = null;
            projectViewLabel = '';
            updateAuthUi();
        }

        function updateAuthUi() {
            const userChip = document.getElementById('userChip');
            const passwordBtn = document.getElementById('passwordBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const securityBtn = document.getElementById('securityBtn');
            const mobilePasswordBtn = document.getElementById('mobilePasswordBtn');
            const mobileLogoutBtn = document.getElementById('mobileLogoutBtn');
            const mobileSecurityBtn = document.getElementById('mobileSecurityBtn');
            const userNav = document.getElementById('sbnav-users');
            const userName = document.getElementById('userChipName');
            const userRole = document.getElementById('userChipRole');

            const loggedIn = Boolean(authState.user);
            userChip.hidden = !loggedIn;
            passwordBtn.hidden = !loggedIn;
            logoutBtn.hidden = !loggedIn;
            securityBtn.hidden = !canManageUsers();
            mobilePasswordBtn.hidden = !loggedIn;
            mobileLogoutBtn.hidden = !loggedIn;
            mobileSecurityBtn.hidden = !canManageUsers();
            userNav.hidden = !canManageUsers();

            if (loggedIn) {
                userName.textContent = authState.user.name;
                userRole.textContent = `${authState.permissions.roleLabel} / ${authState.user.email}`;
            } else {
                userName.textContent = '-';
                userRole.textContent = '-';
            }

            if (!canManageUsers() && currentView === 'users') {
                currentView = 'dashboard';
            }
            updateTopbarActions();
        }

        function applyAuthPayload(payload) {
            authState = {
                token: payload.token || getStoredToken(),
                user: payload.user || null,
                permissions: payload.permissions || { role: 'viewer', roleLabel: '閲覧者', canView: false, canEdit: false, canManageUsers: false },
                session: payload.session || null,
                settings: cloneAuthSettings(payload.settings),
            };
            bumpAuthRevision();
            invalidateLoads();
            setStoredToken(authState.token);
            renderAuthMeta();
            updateAuthUi();
            showAppShell();
        }

        function handleAuthLoss(message, type = 'error') {
            destroyDashboardCharts();
            document.querySelectorAll('.modal-ov.show').forEach(el => el.classList.remove('show'));
            currentView = 'dashboard';
            resetAuthState();
            showAuthShell();
            setAuthMode('login');
            showAuthMessage(message || 'セッションの有効期限が切れました。再度ログインしてください。', type);
        }

        function setButtonBusy(buttonId, busy, busyText, idleText) {
            const btn = document.getElementById(buttonId);
            if (!btn) return;
            btn.disabled = busy;
            btn.textContent = busy ? busyText : idleText;
        }

        function serverCall(method, args = [], options = {}) {
            const opts = {
                secure: true,
                silentAuth: false,
                ...options
            };
            const requestToken = opts.secure ? authState.token : '';
            const authSnapshot = opts.secure ? { revision: authRevision, token: requestToken } : null;
            const finalArgs = opts.secure ? [requestToken, ...args] : args;

            return new Promise((resolve, reject) => {
                const runner = google.script.run
                    .withSuccessHandler(resolve)
                    .withFailureHandler(err => {
                        const normalized = normalizeServerError(err);
                        if (opts.secure
                            && !opts.silentAuth
                            && ['AUTH_REQUIRED', 'AUTH_EXPIRED'].includes(normalized.code)
                            && isCurrentAuthSnapshot(authSnapshot)) {
                            handleAuthLoss(normalized.message);
                        }
                        reject(normalized);
                    });

                runner[method](...finalArgs);
            });
        }

        async function bootAuth() {
            showAuthShell();
            renderAuthMeta();
            setAuthMode('loading');

            try {
                const state = await serverCall('getAuthState', [getStoredToken()], { secure: false, silentAuth: true });
                authState.settings = cloneAuthSettings(state.settings);
                renderAuthMeta();

                if (state.requiresSetup) {
                    resetAuthState();
                    authState.settings = cloneAuthSettings(state.settings);
                    renderAuthMeta();
                    setAuthMode('setup');
                    return;
                }

                if (!state.authenticated) {
                    resetAuthState();
                    authState.settings = cloneAuthSettings(state.settings);
                    renderAuthMeta();
                    setAuthMode('login');
                    return;
                }

                applyAuthPayload(state);
                try {
                    const loadedNow = await loadAll();
                    if (loadedNow !== false) {
                        showView(currentView === 'users' && canManageUsers() ? 'users' : 'dashboard');
                    }
                } catch (err) {
                    showView('dashboard');
                    toast(err.message || 'データ読込に失敗しました。', 'error');
                }
            } catch (err) {
                resetAuthState();
                showAuthShell();
                setAuthMode('login');
                showAuthMessage(err.message || '認証状態の取得に失敗しました。', 'error');
            }
        }

        async function submitLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            setButtonBusy('loginBtn', true, 'ログイン中...', 'ログイン');
            try {
                const state = await serverCall('login', [{ email, password, userAgent: getUserAgent() }], { secure: false, silentAuth: true });
                applyAuthPayload(state);
                document.getElementById('loginPassword').value = '';
                try {
                    await loadAll();
                } catch (err) {
                    toast(err.message || 'データ読込に失敗しました。', 'error');
                }
                showView('dashboard');
            } catch (err) {
                showAuthMessage(err.message || 'ログインに失敗しました。', 'error');
            } finally {
                setButtonBusy('loginBtn', false, 'ログイン中...', 'ログイン');
            }
        }

        async function submitBootstrap(event) {
            event.preventDefault();
            const name = document.getElementById('setupName').value.trim();
            const email = document.getElementById('setupEmail').value.trim();
            const password = document.getElementById('setupPassword').value;
            const confirm = document.getElementById('setupPasswordConfirm').value;

            if (password !== confirm) {
                showAuthMessage('確認用パスワードが一致しません。', 'error');
                return;
            }

            setButtonBusy('setupBtn', true, '作成中...', '管理者アカウントを作成');
            try {
                const state = await serverCall('bootstrapAdmin', [{ name, email, password, userAgent: getUserAgent() }], { secure: false, silentAuth: true });
                applyAuthPayload(state);
                try {
                    await loadAll();
                } catch (err) {
                    toast(err.message || 'データ読込に失敗しました。', 'error');
                }
                showView('dashboard');
            } catch (err) {
                showAuthMessage(err.message || '初回セットアップに失敗しました。', 'error');
            } finally {
                setButtonBusy('setupBtn', false, '作成中...', '管理者アカウントを作成');
            }
        }

        async function logoutApp() {
            try {
                await serverCall('logout');
            } catch (err) {}
            handleAuthLoss('ログアウトしました。', 'success');
        }


        function getDefaultDashboardFilter() {
            const now = new Date();
            return {
                mode: 'month',
                year: String(now.getFullYear()),
                month: String(now.getMonth() + 1).padStart(2, '0')
            };
        }

        const SC = {
            '商談中': 'var(--amber)',
            '進行中': 'var(--green)',
            '完了': 'var(--blue)',
            '停止': 'var(--red)',
            '保留': 'var(--txt3)',
        };

        function destroyDashboardCharts() {
            dashboardCharts.forEach(ch => {
                try { ch.destroy(); } catch (e) {}
            });
            dashboardCharts = [];
        }

        function showView(v) {
            if (v === 'users' && !canManageUsers()) v = 'dashboard';

            const previousView = currentView;
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const sb = document.getElementById('sbnav-' + v); if (sb) sb.classList.add('active');
            document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
            const bn = document.getElementById('bnav-' + v); if (bn) bn.classList.add('active');

            const titles = { dashboard: 'ダッシュボード', projects: '案件一覧', clients: 'クライアント', users: '認証管理' };
            document.getElementById('pageTitle').textContent = titles[v] || v;
            currentView = v;
            document.getElementById('contentArea').scrollTop = 0;

            if (v === 'projects' && previousView !== 'dashboard' && !projectViewLabel) {
                projectViewBaseList = null;
            }

            updateTopbarActions();

            if (loaded) {
                if (v === 'dashboard') renderDashboard();
                if (v === 'projects') renderProjects();
                if (v === 'clients') renderClients();
                if (v === 'users') renderUsers();
            }
        }

        function updateTopbarActions() {
            const topBtn = document.getElementById('topAddBtn');
            const topLbl = document.getElementById('topAddLabel');
            const mobileAddBtn = document.getElementById('mobileAddBtn');
            const mobileAddLabel = document.getElementById('mobileAddLabel');
            if (!topBtn || !topLbl || !mobileAddBtn || !mobileAddLabel) return;

            if (currentView === 'projects' && canEdit()) {
                topBtn.style.display = '';
                topLbl.textContent = '案件を追加';
                return;
            }
            if (currentView === 'clients' && canEdit()) {
                topBtn.style.display = '';
                topLbl.textContent = 'クライアントを追加';
                return;
            }
            if (currentView === 'users' && canManageUsers()) {
                topBtn.style.display = '';
                topLbl.textContent = 'ユーザーを追加';
                return;
            }

            topBtn.style.display = 'none';
        }

        function onTopAdd() {
            if (currentView === 'projects' && canEdit()) openProjModal();
            else if (currentView === 'clients' && canEdit()) openCliModal();
            else if (currentView === 'users' && canManageUsers()) openUserModal();
        }

        function updateTopbarActions() {
            const topBtn = document.getElementById('topAddBtn');
            const topLbl = document.getElementById('topAddLabel');
            const mobileAddBtn = document.getElementById('mobileAddBtn');
            const mobileAddLabel = document.getElementById('mobileAddLabel');
            if (!topBtn || !topLbl || !mobileAddBtn || !mobileAddLabel) return;

            let desktopLabel = '';
            let mobileLabel = '';

            if (currentView === 'projects' && canEdit()) {
                desktopLabel = '案件追加';
                mobileLabel = '案件+';
            } else if (currentView === 'clients' && canEdit()) {
                desktopLabel = 'クライアントを追加';
                mobileLabel = '顧客+';
            } else if (currentView === 'users' && canManageUsers()) {
                desktopLabel = 'ユーザーを追加';
                mobileLabel = 'ユーザー+';
            }

            if (desktopLabel) {
                topBtn.style.display = '';
                topLbl.textContent = desktopLabel;
                mobileAddBtn.hidden = false;
                mobileAddLabel.textContent = mobileLabel;
                return;
            }

            topBtn.style.display = 'none';
            mobileAddBtn.hidden = true;
        }

        async function loadAdminData() {
            if (!canManageUsers()) {
                return { users: [], logs: [] };
            }

            const [users, logs] = await Promise.all([
                serverCall('getUsers'),
                serverCall('getAuditLogs')
            ]);
            return {
                users: users || [],
                logs: logs || [],
            };
        }

        async function loadAll() {
            const requestRevision = invalidateLoads();
            const tasks = [
                serverCall('getProjects'),
                serverCall('getClients'),
                canManageUsers() ? loadAdminData() : Promise.resolve({ users: [], logs: [] })
            ];

            const [projects, clients, adminData] = await Promise.all(tasks);
            if (requestRevision !== loadRevision || !isAuthenticated()) {
                return false;
            }
            allProjects = projects || [];
            allClients = clients || [];
            allUsers = (adminData && adminData.users) || [];
            auditLogs = (adminData && adminData.logs) || [];
            setBadge('projects', allProjects.length);
            setBadge('clients', allClients.length);
            loaded = true;
            refreshCurrent();
            return true;
        }

        async function reload() {
            try {
                await loadAll();
            } catch (err) {
                toast(err.message || 'データの再読み込みに失敗しました。', 'error');
            }
        }

        function refreshCurrent() {
            if (currentView === 'dashboard') renderDashboard();
            if (currentView === 'projects') renderProjects();
            if (currentView === 'clients') renderClients();
            if (currentView === 'users') renderUsers();
        }

        function setBadge(view, n) {
            const el = document.getElementById('badge-' + view);
            if (el) el.textContent = n;
        }



        function getProjectBaseDate(p) {
            const ds = p['完了日'] || p['登録日'];
            const d = new Date(ds);
            return isNaN(d) ? null : d;
        }

        function isProjectInDashboardPeriod(p) {
            const d = getProjectBaseDate(p);
            if (!d) return dashboardFilter.mode === 'all';
            if (dashboardFilter.mode === 'all') return true;
            if (dashboardFilter.mode === 'year') return String(d.getFullYear()) === dashboardFilter.year;
            return String(d.getFullYear()) === dashboardFilter.year &&
                   String(d.getMonth() + 1).padStart(2, '0') === dashboardFilter.month;
        }

        function getDashboardPeriodLabel() {
            if (dashboardFilter.mode === 'all') return '全期間';
            if (dashboardFilter.mode === 'year') return `${dashboardFilter.year}年`;
            return `${dashboardFilter.year}年${Number(dashboardFilter.month)}月`;
        }

        function applyDashboardPreset(mode) {
            const now = new Date();
            if (mode === 'all') {
                dashboardFilter = { mode: 'all', year: '', month: '' };
            } else if (mode === 'year') {
                dashboardFilter = { mode: 'year', year: String(now.getFullYear()), month: '' };
            } else {
                dashboardFilter = {
                    mode: 'month',
                    year: String(now.getFullYear()),
                    month: String(now.getMonth() + 1).padStart(2, '0')
                };
            }
            renderDashboard();
        }

        function openDashboardTargets() {
            projectViewBaseList = allProjects.filter(isProjectInDashboardPeriod);
            projectViewLabel = `対象期間: ${getDashboardPeriodLabel()}`;
            showView('projects');
            const statusSel = document.getElementById('statusFilter');
            if (statusSel) statusSel.value = '';
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.value = '';
            const minSales = document.getElementById('minSales');
            if (minSales) minSales.value = '';
            const maxSales = document.getElementById('maxSales');
            if (maxSales) maxSales.value = '';
            const dateFrom = document.getElementById('dateFrom');
            if (dateFrom) dateFrom.value = '';
            const dateTo = document.getElementById('dateTo');
            if (dateTo) dateTo.value = '';
            renderProjects();
            const title = document.getElementById('pageTitle');
            if (title) title.textContent = `案件一覧（${getDashboardPeriodLabel()}）`;
        }

            const now = new Date();
            const monthlyKeys = [];
            for (let i = 11; i >= 0; i--) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                const k = `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}`;
                monthlyKeys.push(k);

                monthlyStatusSales[k] = { '商談中': 0, '進行中': 0, '完了': 0, '停止': 0, '保留': 0 };
                monthlyStatusCount[k] = { '商談中': 0, '進行中': 0, '完了': 0, '停止': 0, '保留': 0 };
            }

            const leadTimes = [];
            const projectSizes = { 'S': 0, 'M': 0, 'L': 0, 'XL': 0 };

            const filteredPs = ps.filter(isProjectInDashboardPeriod);

            filteredPs.forEach(p => {
                const sales = Number(p['売上']) || 0;

                const status = p['ステータス'] || '不明';
                const bucketDate = new Date((status === '完了' ? (p['完了日'] || p['登録日']) : (p['登録日'] || p['完了日'])) || '');
                const bucketKey = !isNaN(bucketDate) ? `${bucketDate.getFullYear()}/${String(bucketDate.getMonth() + 1).padStart(2, '0')}` : '';

                sc[status] = (sc[status] || 0) + 1;
                if (statusSales[status] == null) statusSales[status] = 0;
                statusSales[status] += sales;

                if (status === '保留' || status === '停止') holdCount++;

                if (bucketKey && monthlyStatusSales[bucketKey]) {
                    monthlyStatusSales[bucketKey][status] = (monthlyStatusSales[bucketKey][status] || 0) + sales;
                    monthlyStatusCount[bucketKey][status] = (monthlyStatusCount[bucketKey][status] || 0) + 1;
                }

                if (status === '商談中') {
                    proposalSales += sales;
                    forecastSales += sales;
                    forecastProfit += profit;
                } else if (status === '進行中') {
                    activeSales += sales;
                    forecastSales += sales;
                    forecastProfit += profit;
                } else if (status === '完了') {
                    totalSales += sales;
                    totalProfit += profit;
                    forecastSales += sales;
                    forecastProfit += profit;

                    if (bucketKey && mCompletedSales[bucketKey] != null) {
                        mCompletedSales[bucketKey] += sales;
                        mCompletedProfit[bucketKey] += profit;
                    }

                    if (p['登録日'] && p['完了日']) {
                        const d1 = new Date(p['登録日']);
                        const d2 = new Date(p['完了日']);

                            const diff = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
                            if (diff >= 0) leadTimes.push(diff);
                        }
                    }

                    if (sales < 10000) projectSizes['S']++;
                    else if (sales < 50000) projectSizes['M']++;
                    else if (sales < 100000) projectSizes['L']++;
                    else projectSizes['XL']++;

                    const clientName = p['クライアント名'] || '未設定';

                proposalSales: monthlyStatusSales[k]['商談中'] || 0,

            const recent = [...filteredPs]

            const insightItems = [];
            if (pipelineSales > 0) insightItems.push(`進行中＋商談中のパイプラインは ${fmt(pipelineSales)} です。`);
            if (forecastSales > 0 && totalSales > 0) insightItems.push(`見込売上は確定売上の ${Math.max(1, Math.round(forecastSales / Math.max(totalSales, 1) * 10) / 10)} 倍です。`);
            if (topClient) insightItems.push(`最大クライアントは「${esc(topClient.name)}」で、売上 ${fmt(topClient.sales)} です。`);

            if ((sc['商談中'] || 0) > (sc['完了'] || 0)) insightItems.push(`商談中案件が多めです。案件化の優先順位付けをすると改善余地があります。`);
            if ((sc['保留'] || 0) + (sc['停止'] || 0) > 0) insightItems.push(`保留・停止が ${holdCount}件 あります。棚卸し対象として確認すると良いです。`);
            if (insightItems.length === 0) insightItems.push('案件を追加すると、見込売上・月次推移・クライアント比率などを自動分析します。');

            let html = filterHtml;
            html += `<div class="dash-stack">`;

            html += `<div class="dash-summary-grid">

                const activeForecastData = monthly.map(m => m.activeSales);

                dashboardCharts.push(new Chart(document.getElementById('forecastStackChart'), {
                    type: 'bar',
                    data: {

        function getFiltered(baseList = allProjects) {
            const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
            const sf = document.getElementById('statusFilter')?.value || '';
            const minSalesEl = document.getElementById('minSales');
            const maxSalesEl = document.getElementById('maxSales');
            const dateFrom = document.getElementById('dateFrom')?.value || '';
            const dateTo = document.getElementById('dateTo')?.value || '';
            const hasMin = !!(minSalesEl && minSalesEl.value !== '');
            const hasMax = !!(maxSalesEl && maxSalesEl.value !== '');
            const minSales = hasMin ? Number(minSalesEl.value) : null;
            const maxSales = hasMax ? Number(maxSalesEl.value) : null;

            return baseList.filter(p => {
                const text = `${p['案件名'] || ''} ${p['クライアント名'] || ''} ${p['備考'] || ''}`.toLowerCase();
                const sales = Number(p['売上']) || 0;
                const d = getProjectBaseDate(p);
                const dv = d ? `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}` : '';

                if (q && !text.includes(q)) return false;
                if (sf && p['ステータス'] !== sf) return false;
                if (hasMin && sales < minSales) return false;
                if (hasMax && sales > maxSales) return false;
                if (dateFrom && (!dv || dv < dateFrom)) return false;
                if (dateTo && (!dv || dv > dateTo)) return false;
                return true;
            });
        }

        function parseUiDate(value) {
            if (!value) return null;
            const normalized = String(value).trim();
            const matched = normalized.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})(?:[ T](\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
            if (matched) {
                const d = new Date(
                    Number(matched[1]),
                    Number(matched[2]) - 1,
                    Number(matched[3]),
                    Number(matched[4] || 0),
                    Number(matched[5] || 0),
                    Number(matched[6] || 0)
                );
                return Number.isNaN(d.getTime()) ? null : d;
            }
            const d = new Date(normalized.replace(/\//g, '-'));
            return Number.isNaN(d.getTime()) ? null : d;
        }

        function isUserLocked(user) {
            const lockedUntil = parseUiDate(user.lockedUntil);
            return Boolean(lockedUntil && lockedUntil.getTime() > Date.now());
        }

            return { cls: 'active', label: '有効' };

            document.getElementById('u_id').value = user.id;
            document.getElementById('u_name').value = user.name || '';
            document.getElementById('u_email').value = user.email || '';
            document.getElementById('u_role').value = user.role || 'viewer';
            document.getElementById('u_status').value = user.status || 'active';
            document.getElementById('u_password').value = '';
            document.getElementById('u_unlock').checked = false;
            document.getElementById('u_passwordLabel').textContent = '新しいパスワード';
            document.getElementById('userModal').classList.add('show');
            setTimeout(() => document.getElementById('u_name').focus(), 100);
        }

        async function saveUserAccount() {
            if (!canManageUsers()) return;

            const id = document.getElementById('u_id').value;
            const name = document.getElementById('u_name').value.trim();
            const email = document.getElementById('u_email').value.trim();
            const role = document.getElementById('u_role').value;
            const status = document.getElementById('u_status').value;
            const password = document.getElementById('u_password').value;
            const unlock = document.getElementById('u_unlock').checked;

            if (!name || !email) {
                toast('氏名とメールアドレスを入力してください。', 'error');
                return;
            }
            if (!id && !password) {
                toast('新規ユーザーには初期パスワードが必要です。', 'error');
                return;
            }

            setButtonBusy('userSaveBtn', true, '保存中...', '保存する');
            try {
                await serverCall('saveUser', [{
                    id,
                    name,
                    email,
                    role,
                    status,
                    password,
                    unlock,
                }]);
                closeModal('userModal');
                toast('ユーザー情報を保存しました。', 'success');
                await reload();
            } catch (err) {
                toast(err.message || 'ユーザー保存に失敗しました。', 'error');
            } finally {
                setButtonBusy('userSaveBtn', false, '保存中...', '保存する');
            }
        }

        async function unlockUserAccount(userId) {
            if (!canManageUsers()) return;
            try {
                await serverCall('unlockUser', [userId]);
                toast('ロック状態を解除しました。', 'success');
                await reload();
            } catch (err) {
                toast(err.message || 'ロック解除に失敗しました。', 'error');
            }
        }

        function openPasswordModal() {
            if (!isAuthenticated()) return;
            ['pw_current', 'pw_next', 'pw_confirm'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('passwordModal').classList.add('show');
            setTimeout(() => document.getElementById('pw_current').focus(), 100);
        }

        async function saveMyPassword() {
            const current = document.getElementById('pw_current').value;
            const next = document.getElementById('pw_next').value;
            const confirm = document.getElementById('pw_confirm').value;

            if (!current || !next || !confirm) {
                toast('すべての項目を入力してください。', 'error');
                return;
            }
            if (next !== confirm) {
                toast('新しいパスワード確認が一致しません。', 'error');
                return;
            }

            setButtonBusy('passwordSaveBtn', true, '更新中...', '更新する');
            try {
                await serverCall('changeMyPassword', [current, next]);
                closeModal('passwordModal');
                toast('パスワードを更新しました。', 'success');
            } catch (err) {
                toast(err.message || 'パスワード変更に失敗しました。', 'error');
            } finally {
                setButtonBusy('passwordSaveBtn', false, '更新中...', '更新する');
            }
        }

        function populateCliSel(selectedId) {
            const sel = document.getElementById('p_client');
            sel.innerHTML = `<option value="">クライアントを選択</option>`;
            allClients.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c['ID'];
                opt.dataset.name = c['クライアント名'];
                opt.textContent = c['クライアント名'];
                if (c['ID'] === selectedId) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        function onCliSelectChange() {}

        function toggleCliInline() {
            if (!canEdit()) return;
            const form = document.getElementById('cliInlineForm');
            const show = !form.classList.contains('show');
            form.classList.toggle('show', show);
            if (show) {
                ['ci_name', 'ci_contact', 'ci_email'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('ci_name').focus();
            }
        }

        async function saveInlineClient() {
            if (!canEdit()) return;
            const name = document.getElementById('ci_name').value.trim();
            if (!name) { document.getElementById('ci_name').classList.add('err'); toast('クライアント名を入力してください', 'error'); return; }
            document.getElementById('ci_name').classList.remove('err');

            setButtonBusy('ciSaveBtn', true, '登録中...', '登録して選択');

            const cli = {
                'クライアント名': name,
                '担当者': document.getElementById('ci_contact').value,
                'メール': document.getElementById('ci_email').value,
                '電話': '', '備考': '', '登録日': '',
            };

            try {
                const res = await serverCall('addClient', [cli]);
                allClients = await serverCall('getClients');
                setBadge('clients', allClients.length);
                populateCliSel(res.id);
                const sel = document.getElementById('p_client');
                sel.value = res.id;
                toggleCliInline();
                toast(`「${name}」を登録しました`, 'success');
            } catch (err) {
                toast(err.message || '登録に失敗しました', 'error');
            } finally {
                setButtonBusy('ciSaveBtn', false, '登録中...', '登録して選択');
            }
        }

        function openProjModal() {
            if (!canEdit()) return;
            document.getElementById('projModalTitle').textContent = '案件を追加';
            ['p_row', 'p_id', 'p_regdate'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('p_completeDate').value = new Date().toISOString().split('T')[0];
            ['p_name', 'p_sales', 'p_profit', 'p_memo'].forEach(id => { const el = document.getElementById(id); el.value = ''; el.classList.remove('err'); });
            document.getElementById('p_status').value = '商談中';
            document.getElementById('profitPreview').style.display = 'none';
            const f = document.getElementById('cliInlineForm'); f.classList.remove('show');
            populateCliSel('');
            document.getElementById('projModal').classList.add('show');
            setTimeout(() => document.getElementById('p_name').focus(), 150);
        }

        function openProjEdit(row) {
            if (!canEdit()) return;
            const p = allProjects.find(x => x['_row'] === row);
            if (!p) return;
            document.getElementById('projModalTitle').textContent = '案件を編集';
            document.getElementById('p_row').value = row;
            document.getElementById('p_id').value = p['ID'];
            document.getElementById('p_regdate').value = p['登録日'] || '';
            document.getElementById('p_completeDate').value = date2input(p['完了日']);
            document.getElementById('p_name').value = p['案件名'] || '';
            document.getElementById('p_sales').value = p['売上'] || '';
            const sameAsS = Number(p['利益']) === Number(p['売上']);
            document.getElementById('p_profit').value = sameAsS ? '' : (p['利益'] || '');
            document.getElementById('p_status').value = p['ステータス'] || '商談中';
            document.getElementById('p_memo').value = p['備考'] || '';
            document.getElementById('cliInlineForm').classList.remove('show');
            populateCliSel(p['クライアントID'] || '');
            updateProfitHint();
            document.getElementById('projModal').classList.add('show');
        }

        function updateProfitHint() {
            const s = Number(document.getElementById('p_sales').value) || 0;
            const pv = document.getElementById('p_profit').value;
            const prev = document.getElementById('profitPreview');
            if (s > 0) {
                const p = pv === '' || pv === null ? s : Number(pv) || 0;
                const m = Math.round(p / s * 100);
                document.getElementById('profitPreviewTxt').textContent = `売上 ${fmt(s)} / 利益 ${fmt(p)} → 利益率 ${m}%`;
                prev.style.display = 'flex';
            } else {
                prev.style.display = 'none';
            }
        }

        async function saveProject() {
            if (!canEdit()) return;
            const name = document.getElementById('p_name').value.trim();
            if (!name) { document.getElementById('p_name').classList.add('err'); toast('案件名を入力してください', 'error'); return; }
            document.getElementById('p_name').classList.remove('err');

            setButtonBusy('projSaveBtn', true, '保存中...', '保存する');

            const sel = document.getElementById('p_client');
            const selOpt = sel.options[sel.selectedIndex];
            const cliId = sel.value || '';
            const cliName = cliId ? (selOpt?.dataset?.name || selOpt?.textContent || '') : '';
            const row = document.getElementById('p_row').value;

            const proj = {
                'ID': document.getElementById('p_id').value,
                '案件名': name,
                'クライアントID': cliId,
                'クライアント名': cliName,
                '売上': document.getElementById('p_sales').value || 0,
                '利益': document.getElementById('p_profit').value,
                'ステータス': document.getElementById('p_status').value,
                '完了日': input2date(document.getElementById('p_completeDate').value),
                '備考': document.getElementById('p_memo').value,
                '登録日': document.getElementById('p_regdate').value,
                '_row': row ? Number(row) : undefined,
            };

            try {
                if (row) await serverCall('updateProject', [proj]);
                else await serverCall('addProject', [proj]);
                closeModal('projModal');
                toast('保存しました', 'success');
                await reload();
            } catch (err) {
                toast(err.message || '保存に失敗しました', 'error');
            } finally {
                setButtonBusy('projSaveBtn', false, '保存中...', '保存する');
            }
        }

        async function delProj(row, name) {
            if (!canEdit()) return;
            if (!confirm(`「${name}」を削除しますか？`)) return;
            try {
                await serverCall('deleteProject', [row]);
                toast('削除しました', 'success');
                await reload();
            } catch (err) {
                toast(err.message || '削除に失敗しました', 'error');
            }
        }

        function openCliModal() {
            if (!canEdit()) return;
            document.getElementById('cliModalTitle').textContent = 'クライアントを追加';
            ['c_row', 'c_id', 'c_regdate'].forEach(id => document.getElementById(id).value = '');
            ['c_name', 'c_contact', 'c_email', 'c_phone', 'c_memo'].forEach(id => { const el = document.getElementById(id); el.value = ''; el.classList.remove('err'); });
            document.getElementById('cliModal').classList.add('show');
            setTimeout(() => document.getElementById('c_name').focus(), 150);
        }

        function openCliEdit(row) {
            if (!canEdit()) return;
            const c = allClients.find(x => x['_row'] === row);
            if (!c) return;
            document.getElementById('cliModalTitle').textContent = 'クライアントを編集';
            document.getElementById('c_row').value = row;
            document.getElementById('c_id').value = c['ID'];
            document.getElementById('c_regdate').value = c['登録日'] || '';
            document.getElementById('c_name').value = c['クライアント名'] || '';
            document.getElementById('c_contact').value = c['担当者'] || '';
            document.getElementById('c_email').value = c['メール'] || '';
            document.getElementById('c_phone').value = c['電話'] || '';
            document.getElementById('c_memo').value = c['備考'] || '';
            document.getElementById('cliModal').classList.add('show');
        }

        async function saveClient() {
            if (!canEdit()) return;
            const name = document.getElementById('c_name').value.trim();
            if (!name) { document.getElementById('c_name').classList.add('err'); toast('クライアント名を入力してください', 'error'); return; }
            document.getElementById('c_name').classList.remove('err');

            setButtonBusy('cliSaveBtn', true, '保存中...', '保存する');
            const row = document.getElementById('c_row').value;
            const cli = {
                'ID': document.getElementById('c_id').value,
                'クライアント名': name,
                '担当者': document.getElementById('c_contact').value,
                'メール': document.getElementById('c_email').value,
                '電話': document.getElementById('c_phone').value,
                '備考': document.getElementById('c_memo').value,
                '登録日': document.getElementById('c_regdate').value,
                '_row': row ? Number(row) : undefined,
            };

            try {
                if (row) await serverCall('updateClient', [cli]);
                else await serverCall('addClient', [cli]);
                closeModal('cliModal');
                toast('保存しました', 'success');
                await reload();
            } catch (err) {
                toast(err.message || '保存に失敗しました', 'error');
            } finally {
                setButtonBusy('cliSaveBtn', false, '保存中...', '保存する');
            }
        }

        async function delCli(row, name) {
            if (!canEdit()) return;
            if (!confirm(`「${name}」を削除しますか？`)) return;
            try {
                await serverCall('deleteClient', [row]);
                toast('削除しました', 'success');
                await reload();
            } catch (err) {
                toast(err.message || '削除に失敗しました', 'error');
            }
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function onOvClick(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { ['projModal', 'cliModal', 'userModal', 'passwordModal'].forEach(closeModal); } });

        function toast(msg, type = 'success') {
            const w = document.getElementById('toastWrap');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            w.appendChild(el);
            setTimeout(() => { el.classList.add('toast-out'); setTimeout(() => el.remove(), 200); }, 3000);
        }

        function emptyState(title, sub) {
            return `<div class="empty">
                <div class="empty-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div class="empty-title">${title}</div>
                <div class="empty-sub">${sub}</div>
            </div>`;
        }

        window.addEventListener('load', () => {
            let meta = document.querySelector('meta[name="viewport"]');
            if (!meta) {
                meta = document.createElement('meta');
                meta.name = "viewport";
                document.getElementsByTagName('head')[0].appendChild(meta);
            }
            meta.content = "width=device-width, initial-scale=1.0, viewport-fit=cover";
            showView('dashboard');
            bootAuth();
        });
    </script>
</body>
