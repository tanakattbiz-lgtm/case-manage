  <script>
    (function () {
      try {
        var stored = JSON.parse(localStorage.getItem('case-manage.auth.session') || 'null');
        if (stored && stored.token) {
          document.documentElement.classList.add('resume-session');
        }
      } catch (error) {
      }

      try {
        if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
          document.documentElement.classList.add('display-standalone');
        }
      } catch (error) {
      }
    })();
  </script>
