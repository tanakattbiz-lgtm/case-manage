<script>
  (function (App) {
    App.charts = {
      renderTrend: function (targetId, items) {
        var target = App.ui.byId(targetId);
        if (!items || !items.length) {
          target.innerHTML = App.ui.renderStateBlock('データがありません。', '案件が登録されると月次推移が表示されます。', 'info');
          return;
        }

        var width = 760;
        var height = 320;
        var padding = { top: 24, right: 20, bottom: 44, left: 54 };
        var chartWidth = width - padding.left - padding.right;
        var chartHeight = height - padding.top - padding.bottom;
        var max = Math.max.apply(null, items.map(function (item) {
          return Math.max(item.sales || 0, item.profit || 0, item.activeSales || 0, item.proposalSales || 0);
        }).concat([1]));

        function point(index, value) {
          var x = padding.left + (chartWidth / Math.max(items.length - 1, 1)) * index;
          var y = padding.top + chartHeight - ((Number(value) || 0) / max) * chartHeight;
          return x + ',' + y;
        }

        var salesLine = items.map(function (item, index) { return point(index, item.sales); }).join(' ');
        var profitLine = items.map(function (item, index) { return point(index, item.profit); }).join(' ');
        var labels = items.map(function (item, index) {
          var x = padding.left + (chartWidth / Math.max(items.length - 1, 1)) * index;
          return '<text x="' + x + '" y="' + (height - 12) + '" text-anchor="middle" font-size="11" fill="#64748b">' + App.helpers.escape(item.month.replace('/', '.')) + '</text>';
        }).join('');
        var grid = [0.25, 0.5, 0.75, 1].map(function (ratio) {
          var y = padding.top + chartHeight - chartHeight * ratio;
          return '<line x1="' + padding.left + '" y1="' + y + '" x2="' + (width - padding.right) + '" y2="' + y + '" stroke="rgba(15,23,42,0.08)" stroke-dasharray="4 6" />';
        }).join('');

        target.innerHTML = ''
          + '<svg viewBox="0 0 ' + width + ' ' + height + '" width="100%" height="100%" role="img" aria-label="売上と利益の推移">'
          + grid
          + '<line x1="' + padding.left + '" y1="' + (padding.top + chartHeight) + '" x2="' + (width - padding.right) + '" y2="' + (padding.top + chartHeight) + '" stroke="rgba(15,23,42,0.18)" />'
          + '<polyline fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="' + salesLine + '" />'
          + '<polyline fill="none" stroke="#16a34a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="' + profitLine + '" />'
          + labels
          + '</svg>'
          + '<div class="stats-row"><span><strong style="color:#3b82f6;">■</strong> 売上</span><span><strong style="color:#16a34a;">■</strong> 利益</span></div>';
      }
    };
  })(window.App);
</script>
