<script>
  App.charts = {
    renderTrend: function (targetId, items) {
      var target = App.ui.byId(targetId);
      if (!items || !items.length) {
        App.ui.renderEmpty(target, 'データがありません', '案件が登録されると月次推移が表示されます。');
        return;
      }

      var width = 680;
      var height = 260;
      var padding = { top: 24, right: 20, bottom: 42, left: 44 };
      var chartWidth = width - padding.left - padding.right;
      var chartHeight = height - padding.top - padding.bottom;
      var max = Math.max.apply(null, items.map(function (item) {
        return Math.max(item.sales || 0, item.profit || 0, item.activeSales || 0, item.proposalSales || 0);
      }).concat([1]));

      function point(index, value) {
        var x = padding.left + (chartWidth / Math.max(items.length - 1, 1)) * index;
        var y = padding.top + chartHeight - ((Number(value) || 0) / max) * chartHeight;
        return x + ',' + y;
      }

      var salesLine = items.map(function (item, index) { return point(index, item.sales); }).join(' ');
      var profitLine = items.map(function (item, index) { return point(index, item.profit); }).join(' ');
      var labels = items.map(function (item, index) {
        var x = padding.left + (chartWidth / Math.max(items.length - 1, 1)) * index;
        return '<text x="' + x + '" y="' + (height - 10) + '" text-anchor="middle" font-size="11" fill="#5f6b76">' + App.helpers.escape(item.month.replace('/', '.')) + '</text>';
      }).join('');
      var grid = [0.25, 0.5, 0.75, 1].map(function (ratio) {
        var y = padding.top + chartHeight - chartHeight * ratio;
        return '<line x1="' + padding.left + '" y1="' + y + '" x2="' + (width - padding.right) + '" y2="' + y + '" stroke="rgba(31,41,51,0.08)" stroke-dasharray="4 6" />';
      }).join('');

      target.innerHTML = ''
        + '<svg viewBox="0 0 ' + width + ' ' + height + '" width="100%" height="100%" role="img" aria-label="月次推移チャート">'
        + grid
        + '<line x1="' + padding.left + '" y1="' + (padding.top + chartHeight) + '" x2="' + (width - padding.right) + '" y2="' + (padding.top + chartHeight) + '" stroke="rgba(31,41,51,0.18)" />'
        + '<polyline fill="none" stroke="#b65e34" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="' + salesLine + '" />'
        + '<polyline fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="' + profitLine + '" />'
        + labels
        + '</svg>'
        + '<div class="project-stats" style="margin-top:12px;"><span><strong style="color:#b65e34;">■</strong> 売上</span><span><strong style="color:#2563eb;">■</strong> 利益</span></div>';
    },

    renderBarRows: function (targetId, items, valueKey, formatter) {
      var target = App.ui.byId(targetId);
      if (!items || !items.length) {
        App.ui.renderEmpty(target, 'データがありません', '完了案件が増えると上位クライアントが表示されます。');
        return;
      }

      var max = Math.max.apply(null, items.map(function (item) {
        return Number(item[valueKey]) || 0;
      }).concat([1]));

      target.innerHTML = items.map(function (item) {
        var width = Math.max(8, Math.round(((Number(item[valueKey]) || 0) / max) * 100));
        return ''
          + '<div class="ranking-row">'
          + '  <div class="project-meta">'
          + '    <div><h3>' + App.helpers.escape(item.name) + '</h3><p>' + App.helpers.escape(formatter(item)) + '</p></div>'
          + '  </div>'
          + '  <div class="ranking-bar"><span style="width:' + width + '%;"></span></div>'
          + '</div>';
      }).join('');
    }
  };
</script>
