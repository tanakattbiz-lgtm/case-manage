<style>
  .split-main {
    display: grid;
    gap: 20px;
    min-width: 0;
  }

  .detail-section {
    display: grid;
    gap: 12px;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: #ffffff;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .detail-item {
    padding: 14px;
    border-radius: 14px;
    background: var(--panel-muted);
  }

  .detail-item dt {
    margin-bottom: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .detail-item dd {
    margin: 0;
    font-size: 14px;
    color: var(--text);
  }

  .detail-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .detail-modal-content {
    display: grid;
    gap: 14px;
    min-height: 200px;
  }

  .detail-modal-actions:empty {
    display: none;
  }

  .timeline {
    display: grid;
    gap: 12px;
  }

  .timeline-item {
    position: relative;
    padding-left: 18px;
  }

  .timeline-item::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 0;
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--accent);
  }

  .timeline-item strong {
    display: block;
    margin-bottom: 4px;
  }

  .filter-form {
    display: grid;
    gap: 16px;
  }

  .filter-chip-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    min-height: 44px;
    align-items: center;
  }

  .collapsible-card:not(.is-open) .filter-form {
    display: none;
  }

  .table-wrap {
    overflow: auto;
    border-radius: 16px;
    border: 1px solid var(--line);
  }

  .data-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    min-width: 760px;
    background: #ffffff;
  }

  .data-table th,
  .data-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
    text-align: left;
    vertical-align: top;
  }

  .data-table thead th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: rgba(255, 255, 255, 0.94);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .data-table tbody tr {
    transition: background-color 180ms ease;
  }

  .data-table tbody tr:hover {
    background: rgba(59, 130, 246, 0.04);
  }

  .data-table tbody tr.is-selected {
    background: var(--select-bg);
  }

  .num {
    text-align: right !important;
    font-family: var(--font-mono);
  }

  .actions-cell {
    width: 1%;
    white-space: nowrap;
    text-align: right !important;
  }

  .list-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .table-caption {
    color: var(--muted);
    font-size: 12px;
  }

  .mobile-card-list,
  .client-list-table {
    display: grid;
    gap: 12px;
  }

  .mobile-card,
  .list-row {
    display: grid;
    gap: 12px;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: #ffffff;
  }

  .row-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .row-head strong {
    font-size: 15px;
  }

  .row-sub {
    font-size: 13px;
    color: var(--muted);
  }

  .stats-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    color: var(--muted);
    font-size: 13px;
  }

  .pager {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .pager-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .pager-status {
    color: var(--muted);
    font-size: 13px;
  }

  @media (max-width: 1180px) {
    .detail-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 920px) {
    .field-grid-2,
    .field-grid-3,
    .detail-grid {
      grid-template-columns: 1fr;
    }

    .detail-modal-content {
      min-height: 140px;
    }
  }

  @media (max-width: 640px) {
    .detail-section,
    .mobile-card,
    .list-row {
      padding: 16px;
    }

    .field-span-2 {
      grid-column: auto;
    }

    .form-actions,
    .modal-actions {
      justify-content: stretch;
    }

    .form-actions .btn,
    .modal-actions .btn {
      width: 100%;
    }
  }
</style>
