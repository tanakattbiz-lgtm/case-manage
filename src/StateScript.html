<script>
  window.App = window.App || {};

  (function (App) {
    function defaultPageSize() {
      return window.matchMedia && window.matchMedia('(max-width: 920px)').matches ? 10 : 20;
    }

    App.constants = {
      storageKey: 'case-manage.auth.session',
      cacheKey: 'case-manage.ui.cache.v2',
      listPageSizes: [10, 20, 50],
      projectStatuses: ['商談中', '進行中', '完了', '停止', '保留'],
      viewTitles: {
        dashboard: {
          eyebrow: '概要',
          title: 'ダッシュボード',
          subtitle: '必要な情報だけを上から順に確認できます。'
        },
        projects: {
          eyebrow: '案件',
          title: '案件一覧',
          subtitle: '検索から詳細確認まで同じ流れで操作できます。'
        },
        clients: {
          eyebrow: '顧客',
          title: 'クライアント管理',
          subtitle: '顧客情報をすばやく検索できます。'
        },
        users: {
          eyebrow: '管理',
          title: '認証管理',
          subtitle: 'ユーザー情報を整理して管理できます。'
        }
      },
      assistContent: {
        install: { eyebrow: '案内', title: '使い方', description: '必要な操作だけを表示しています。', sections: [{ title: '操作', body: '画面上部のボタンから登録・更新できます。' }] },
        project: { eyebrow: '案内', title: '案件入力', description: '必須項目を入力して保存してください。', sections: [{ title: '入力', body: '案件名・クライアント・ステータスを確認して保存します。' }] },
        client: { eyebrow: '案内', title: '顧客入力', description: '顧客情報を入力して保存してください。', sections: [{ title: '入力', body: '顧客名と連絡先を入力します。' }] },
        user: { eyebrow: '案内', title: 'ユーザー入力', description: 'ユーザー情報を入力して保存してください。', sections: [{ title: '入力', body: '氏名・メール・権限を確認して保存します。' }] }
      }
    };

    App.defaultDashboardFilter = function () {
      var now = new Date();
      return {
        mode: 'month',
        year: String(now.getFullYear()),
        month: String(now.getMonth() + 1).padStart(2, '0')
      };
    };

    App.defaultProjectFilters = function () {
      return { query: '', status: '', clientId: '', dateFrom: '', dateTo: '' };
    };

    App.defaultClientFilters = function () {
      return { query: '' };
    };

    App.defaultUserFilters = function () {
      return { query: '', role: '', status: '' };
    };

    App.defaultAuditFilters = function () {
      return { query: '', result: '' };
    };

    App.emptyPagination = function () {
      return {
        page: 1,
        pageSize: defaultPageSize(),
        totalItems: 0,
        totalPages: 1,
        hasPrev: false,
        hasNext: false,
        start: 0,
        end: 0
      };
    };

    App.helpers = {
      icon: function (name, size) {
        return '<svg class="icon ' + (size || 'icon-16') + '" aria-hidden="true"><use href="#icon-' + String(name || 'info') + '"></use></svg>';
      },
      escape: function (value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      },
      clone: function (value) {
        return JSON.parse(JSON.stringify(value == null ? null : value));
      },
      currency: function (value) {
        return '¥' + Math.round(Number(value) || 0).toLocaleString('ja-JP');
      },
      pct: function (value) {
        return Math.round(Number(value) || 0) + '%';
      },
      number: function (value) {
        return (Number(value) || 0).toLocaleString('ja-JP');
      },
      parseDate: function (value) {
        if (!value) return null;
        var normalized = String(value).trim().replace(/\//g, '-');
        var parsed = new Date(normalized);
        return Number.isNaN(parsed.getTime()) ? null : parsed;
      },
      dateLabel: function (value) {
        var date = this.parseDate(value);
        if (!date) return '未設定';
        return [
          date.getFullYear(),
          String(date.getMonth() + 1).padStart(2, '0'),
          String(date.getDate()).padStart(2, '0')
        ].join('.');
      },
      dateTimeLabel: function (value) {
        var date = this.parseDate(value);
        if (!date) return '未設定';
        return [
          date.getFullYear(),
          String(date.getMonth() + 1).padStart(2, '0'),
          String(date.getDate()).padStart(2, '0')
        ].join('.') + ' ' + String(date.getHours()).padStart(2, '0') + ':' + String(date.getMinutes()).padStart(2, '0');
      },
      serverDateToInput: function (value) {
        return value ? String(value).split(' ')[0].replace(/\//g, '-') : '';
      },
      inputToServerDate: function (value) {
        return value ? String(value).replace(/-/g, '/') : '';
      },
      projectStatusClass: function (status) {
        if (status === '商談中') return 'lead';
        if (status === '進行中') return 'active';
        if (status === '完了') return 'completed';
        if (status === '停止') return 'stopped';
        return 'pending';
      },
      userStatusClass: function (user) {
        if (!user) return 'disabled';
        if (this.isUserLocked(user)) return 'locked';
        return user.status === 'active' ? 'completed' : 'disabled';
      },
      userStatusLabel: function (user) {
        if (!user) return '未設定';
        if (this.isUserLocked(user)) return 'ロック中';
        return user.status === 'active' ? '有効' : '無効';
      },
      isUserLocked: function (user) {
        if (!user || !user.lockedUntil) return false;
        var date = this.parseDate(user.lockedUntil);
        return Boolean(date && date.getTime() > Date.now());
      },
      resultClass: function (value) {
        return value === 'SUCCESS' ? 'SUCCESS' : 'FAILURE';
      },
      isMobile: function () {
        return window.matchMedia && window.matchMedia('(max-width: 920px)').matches;
      },
      isStandalone: function () {
        return Boolean(
          (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
          window.navigator.standalone
        );
      },
      formDataSignature: function (values) {
        return JSON.stringify(values || {});
      }
    };

    App.state = {
      currentView: 'dashboard',
      auth: {
        token: '',
        user: null,
        permissions: { role: 'viewer', roleLabel: '閲覧者', canView: false, canEdit: false, canManageUsers: false },
        session: null,
        settings: {
          passwordMinLength: 10,
          maxFailedAttempts: 5,
          lockoutMinutes: 15,
          sessionTtlMinutes: 480,
          roles: { admin: '管理者', editor: '編集者', viewer: '閲覧者' }
        }
      },
      ui: {
        online: navigator.onLine !== false,
        reconnecting: false,
        drawerOpen: false,
        activeModal: '',
        activeModalOptions: null,
        modalFocus: null,
        confirmResolver: null,
        messageResolver: null,
        deferredInstallPrompt: null,
        lastSyncAt: '',
        loadingCount: 0
      },
      dashboard: {
        filter: App.defaultDashboardFilter(),
        data: null,
        loading: false,
        stale: false,
        error: '',
        loadedKey: ''
      },
      projects: {
        filters: App.defaultProjectFilters(),
        page: 1,
        pageSize: defaultPageSize(),
        items: [],
        pagination: App.emptyPagination(),
        summary: null,
        loading: false,
        stale: false,
        error: '',
        scope: null,
        selectedId: '',
        detail: null,
        detailLoading: false,
        detailError: '',
        clientOptions: [],
        optionsLoaded: false,
        formSnapshot: '',
        formMode: 'create'
      },
      clients: {
        filters: App.defaultClientFilters(),
        page: 1,
        pageSize: defaultPageSize(),
        items: [],
        pagination: App.emptyPagination(),
        summary: null,
        loading: false,
        stale: false,
        error: '',
        selectedId: '',
        detail: null,
        detailLoading: false,
        detailError: '',
        formSnapshot: '',
        formMode: 'create'
      },
      users: {
        filters: App.defaultUserFilters(),
        page: 1,
        pageSize: defaultPageSize(),
        items: [],
        pagination: App.emptyPagination(),
        summary: null,
        loading: false,
        stale: false,
        error: '',
        selectedId: '',
        detail: null,
        detailLoading: false,
        detailError: '',
        audits: {
          filters: App.defaultAuditFilters(),
          page: 1,
          pageSize: defaultPageSize(),
          items: [],
          pagination: App.emptyPagination(),
          summary: null,
          loading: false,
          stale: false,
          error: ''
        },
        formSnapshot: '',
        formMode: 'create'
      }
    };

    App.isAuthenticated = function () {
      return Boolean(App.state.auth.user && App.state.auth.token);
    };

    App.canEdit = function () {
      return Boolean(App.state.auth.permissions && App.state.auth.permissions.canEdit);
    };

    App.canManageUsers = function () {
      return Boolean(App.state.auth.permissions && App.state.auth.permissions.canManageUsers);
    };

    App.resetDataState = function () {
      App.state.currentView = 'dashboard';
      App.state.dashboard = {
        filter: App.defaultDashboardFilter(),
        data: null,
        loading: false,
        stale: false,
        error: '',
        loadedKey: ''
      };
      App.state.projects = {
        filters: App.defaultProjectFilters(),
        page: 1,
        pageSize: defaultPageSize(),
        items: [],
        pagination: App.emptyPagination(),
        summary: null,
        loading: false,
        stale: false,
        error: '',
        scope: null,
        selectedId: '',
        detail: null,
        detailLoading: false,
        detailError: '',
        clientOptions: [],
        optionsLoaded: false,
        formSnapshot: '',
        formMode: 'create'
      };
      App.state.clients = {
        filters: App.defaultClientFilters(),
        page: 1,
        pageSize: defaultPageSize(),
        items: [],
        pagination: App.emptyPagination(),
        summary: null,
        loading: false,
        stale: false,
        error: '',
        selectedId: '',
        detail: null,
        detailLoading: false,
        detailError: '',
        formSnapshot: '',
        formMode: 'create'
      };
      App.state.users = {
        filters: App.defaultUserFilters(),
        page: 1,
        pageSize: defaultPageSize(),
        items: [],
        pagination: App.emptyPagination(),
        summary: null,
        loading: false,
        stale: false,
        error: '',
        selectedId: '',
        detail: null,
        detailLoading: false,
        detailError: '',
        audits: {
          filters: App.defaultAuditFilters(),
          page: 1,
          pageSize: defaultPageSize(),
          items: [],
          pagination: App.emptyPagination(),
          summary: null,
          loading: false,
          stale: false,
          error: ''
        },
        formSnapshot: '',
        formMode: 'create'
      };
    };
  })(window.App);
</script>
