<script>
  (function (App) {
    App.dashboard = {
      bindEvents: function () {
        App.ui.qq('[data-dashboard-mode]').forEach(function (button) {
          button.addEventListener('click', function () {
            App.state.dashboard.filter.mode = button.dataset.dashboardMode;
            if (button.dataset.dashboardMode === 'year') {
              App.state.dashboard.filter.month = '';
            }
            if (button.dataset.dashboardMode === 'all') {
              App.state.dashboard.filter.year = '';
              App.state.dashboard.filter.month = '';
            }
            App.dashboard.reload();
          });
        });

        App.ui.byId('dashboardYear').addEventListener('change', function (event) {
          App.state.dashboard.filter.year = event.target.value;
          App.state.dashboard.filter.mode = event.target.value ? 'year' : 'all';
          App.dashboard.reload();
        });

        App.ui.byId('dashboardMonth').addEventListener('change', function (event) {
          App.state.dashboard.filter.month = event.target.value;
          if (event.target.value) {
            App.state.dashboard.filter.mode = 'month';
            if (!App.state.dashboard.filter.year) {
              App.state.dashboard.filter.year = String(new Date().getFullYear());
            }
          }
          App.dashboard.reload();
        });

        App.ui.byId('dashboardStatusGrid').addEventListener('click', function (event) {
          var button = event.target.closest('[data-dashboard-status]');
          if (!button) return;
          App.projects.applyScope({
            label: App.state.dashboard.data && App.state.dashboard.data.filter ? App.state.dashboard.data.filter.label : '',
            mode: App.state.dashboard.filter.mode,
            year: App.state.dashboard.filter.year,
            month: App.state.dashboard.filter.month,
            status: button.dataset.dashboardStatus
          });
        });
      },

      syncFilterControls: function () {
        var yearSelect = App.ui.byId('dashboardYear');
        var monthSelect = App.ui.byId('dashboardMonth');
        var currentYear = new Date().getFullYear();
        var years = [currentYear, currentYear - 1, currentYear - 2, currentYear - 3, currentYear - 4];

        yearSelect.innerHTML = '<option value="">すべての年</option>' + years.map(function (year) {
          var selected = App.state.dashboard.filter.year === String(year) ? ' selected' : '';
          return '<option value="' + year + '"' + selected + '>' + year + '年</option>';
        }).join('');

        monthSelect.innerHTML = '<option value="">すべての月</option>' + Array.from({ length: 12 }).map(function (_, index) {
          var month = String(index + 1).padStart(2, '0');
          var selected = App.state.dashboard.filter.month === month ? ' selected' : '';
          return '<option value="' + month + '"' + selected + '>' + (index + 1) + '月</option>';
        }).join('');

        App.ui.qq('[data-dashboard-mode]').forEach(function (button) {
          button.classList.toggle('is-active', button.dataset.dashboardMode === App.state.dashboard.filter.mode);
        });
      },

      ensureLoaded: async function (force) {
        var key = JSON.stringify(App.state.dashboard.filter);
        if (!force && App.state.dashboard.data && App.state.dashboard.loadedKey === key) {
          this.render();
          return App.state.dashboard.data;
        }

        App.state.dashboard.loading = true;
        try {
          var response = await App.api.dashboard.get(App.state.dashboard.filter);
          App.state.dashboard.data = response;
          App.state.dashboard.loadedKey = key;
          App.state.dashboard.error = '';
          App.state.dashboard.stale = Boolean(response && response.__meta && response.__meta.stale);
          if (response && response.__meta) {
            App.ui.setLastSync(response.__meta.savedAt);
          }
          this.syncFilterControls();
          this.render();
          App.ui.updateBadges();
          return response;
        } catch (error) {
          App.state.dashboard.error = error.message || 'ダッシュボードの読み込みに失敗しました。';
          this.renderError();
          throw error;
        } finally {
          App.state.dashboard.loading = false;
        }
      },

      reload: async function () {
        try {
          await this.ensureLoaded(true);
        } catch (error) {
        }
      },

      metricCard: function (title, value, caption, icon) {
        var svg = icon ? '<div class="metric-icon" style="color: var(--accent); margin-bottom: 8px;"><svg class="icon icon-24" aria-hidden="true"><use href="#icon-' + icon + '"></use></svg></div>' : '';
        return ''
          + '<div class="surface metric-card">'
          + svg
          + '<strong>' + App.helpers.escape(title) + '</strong>'
          + '<div class="metric">' + App.helpers.escape(value) + '</div>'
          + '<span>' + App.helpers.escape(caption) + '</span>'
          + '</div>';
      },

      renderError: function () {
        var offline = String(App.state.dashboard.error || '').indexOf('オフライン') >= 0;
        App.ui.byId('dashboardMetrics').innerHTML = App.ui.renderStateBlock(
          offline ? 'オフラインのため最新情報を取得できません。' : 'ダッシュボードを表示できません。',
          App.state.dashboard.error,
          offline ? 'cloud-off' : 'error',
          '<button class="btn btn-secondary" type="button" data-action="refresh-dashboard">再試行</button>'
        );
      },

      render: function () {
        var data = App.state.dashboard.data;
        if (!data) return this.renderError();

        App.ui.byId('dashboardPeriodLabel').textContent = data.filter.label + (App.state.dashboard.stale ? ' / キャッシュ表示' : '');
        App.ui.byId('dashboardMetrics').innerHTML = [
          this.metricCard('予測売上', App.helpers.currency(data.summary.forecastSales), '完了・進行中・商談中を含む', 'folder'),
          this.metricCard('確定売上', App.helpers.currency(data.summary.totalSales), '完了案件のみ', 'success'),
          this.metricCard('確定利益', App.helpers.currency(data.summary.totalProfit), '完了案件のみ', 'chart'),
          this.metricCard('平均利益率', App.helpers.pct(data.summary.avgMargin), '完了案件平均', 'percent')
        ].join('');

        App.ui.byId('dashboardStatusGrid').innerHTML = App.constants.projectStatuses.map(function (status) {
          return ''
            + '<button class="status-card" type="button" data-dashboard-status="' + App.helpers.escape(status) + '">'
            + '<div>' + App.helpers.escape(status) + '</div>'
            + '<strong class="metric">' + App.helpers.number(data.statusCount[status] || 0) + '</strong>'
            + '<span>' + App.helpers.currency(data.statusSales[status] || 0) + '</span>'
            + '</button>';
        }).join('');

        App.charts.renderTrend('dashboardTrend', data.monthly);

        App.ui.byId('dashboardRanking').innerHTML = data.clientRanking.length
          ? data.clientRanking.map(function (item) {
              var width = Math.max(8, Math.round(((Number(item.sales) || 0) / Math.max(1, data.clientRanking[0].sales || 1)) * 100));
              return ''
                + '<div class="ranking-row">'
                + '<div class="row-head"><div><strong>' + App.helpers.escape(item.name) + '</strong><div class="row-sub">売上 ' + App.helpers.escape(App.helpers.currency(item.sales)) + ' / 利益率 ' + App.helpers.escape(App.helpers.pct(item.margin)) + '</div></div></div>'
                + '<div class="ranking-bar"><span style="width:' + width + '%;"></span></div>'
                + '</div>';
            }).join('')
          : App.ui.renderStateBlock('データがありません。', '完了案件が増えると上位クライアントが表示されます。', 'info');

        App.ui.byId('dashboardRecent').innerHTML = data.recent.length
          ? data.recent.map(function (project) {
              return ''
                + '<div class="recent-row">'
                + '<div class="row-head"><div><strong>' + App.helpers.escape(project.name) + '</strong><div class="row-sub">' + App.helpers.escape(project.clientName || 'クライアント未設定') + '</div></div><span class="status-pill ' + App.helpers.projectStatusClass(project.status) + '">' + App.helpers.escape(project.status) + '</span></div>'
                + '<div class="stats-row"><span>売上 ' + App.helpers.escape(App.helpers.currency(project.sales)) + '</span><span>利益 ' + App.helpers.escape(App.helpers.currency(project.profit)) + '</span><span>完了日 ' + App.helpers.escape(App.helpers.dateLabel(project.completedAt)) + '</span></div>'
                + '</div>';
            }).join('')
          : App.ui.renderStateBlock('完了案件はまだありません。', '案件を完了にするとここへ表示されます。', 'info');

        App.ui.byId('dashboardInsights').innerHTML = (data.insights || []).map(function (text) {
          return '<div class="insight-item"><strong>•</strong><span>' + App.helpers.escape(text) + '</span></div>';
        }).join('');

        App.ui.byId('dashboardPwaCard').innerHTML = ''
          + '<div class="list-row">'
          + '<div class="row-head"><div><strong>確認ポイント</strong><div class="row-sub">案件の更新状況を日次で確認してください。</div></div></div>'
          + '<div class="stats-row"><span>最終更新: ' + (App.state.ui.lastSyncAt ? App.helpers.dateTimeLabel(App.state.ui.lastSyncAt) : '未更新') + '</span></div>'
          + '</div>';
      }
    };
  })(window.App);
</script>
