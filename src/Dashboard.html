<section class="view is-active" id="view-dashboard" data-view-panel="dashboard">
  <div class="panel dashboard-controls">
    <div class="dashboard-filter-row">
      <div>
        <div class="page-eyebrow">Server Aggregation</div>
        <h2 style="margin:6px 0 0;">ダッシュボード</h2>
      </div>
      <div class="dashboard-filters">
        <button class="btn btn-secondary btn-small" type="button" data-dashboard-mode="all">全期間</button>
        <button class="btn btn-secondary btn-small" type="button" data-dashboard-mode="year">今年</button>
        <button class="btn btn-secondary btn-small" type="button" data-dashboard-mode="month">今月</button>
      </div>
    </div>

    <div class="dashboard-filter-row">
      <div class="dashboard-filters">
        <select class="select" id="dashboardYear" style="min-width: 140px;"></select>
        <select class="select" id="dashboardMonth" style="min-width: 140px;"></select>
      </div>
      <button class="btn btn-primary btn-small" type="button" data-action="dashboard-open-projects">対象案件を表示</button>
    </div>
  </div>

  <div class="dashboard-metrics" id="dashboardMetrics"></div>

  <div class="dashboard-grid">
    <div class="panel dashboard-section">
      <div class="section-title">
        <h3>月次推移</h3>
        <span id="dashboardPeriodLabel">集計期間を読み込み中</span>
      </div>
      <div class="chart-box" id="dashboardTrend"></div>
    </div>

    <div class="panel dashboard-section">
      <div class="section-title">
        <h3>ステータス分布</h3>
        <span>クリックで案件一覧へ反映</span>
      </div>
      <div class="status-grid" id="dashboardStatusGrid"></div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="panel dashboard-section">
      <div class="section-title">
        <h3>主要クライアント</h3>
        <span>完了案件ベース</span>
      </div>
      <div class="ranking-list" id="dashboardRanking"></div>
    </div>

    <div class="panel dashboard-section">
      <div class="section-title">
        <h3>最近の完了案件</h3>
        <span>完了日優先</span>
      </div>
      <div class="recent-list" id="dashboardRecent"></div>
    </div>
  </div>

  <div class="panel dashboard-section">
    <div class="section-title">
      <h3>インサイト</h3>
      <span>集計は server 側、描画だけ client 側</span>
    </div>
    <div class="insight-list" id="dashboardInsights"></div>
  </div>
</section>
