<div class="auth-shell" id="authShell">
  <div class="auth-card panel">
    <section class="auth-copy">
      <div class="page-eyebrow">Case Manage</div>
      <h1>案件と顧客情報を、ひとつの画面で管理。</h1>
      <p>案件の進捗、クライアント情報、売上や利益の状況をまとめて確認できます。メールアドレスとパスワードを入力してログインしてください。</p>
      <div class="auth-points">
        <div class="auth-point"><strong>01</strong><span>案件の進捗と対応状況を一覧で確認</span></div>
        <div class="auth-point"><strong>02</strong><span>クライアント情報と売上・利益をまとめて管理</span></div>
        <div class="auth-point"><strong>03</strong><span>権限に応じて必要なメニューだけを表示</span></div>
      </div>
    </section>

    <section class="auth-form">
      <div>
        <div class="page-eyebrow" id="authEyebrow">ログイン</div>
        <h2 id="authTitle">ログイン</h2>
        <p id="authSubtitle">メールアドレスとパスワードでログインしてください。</p>
      </div>

      <div class="auth-note" id="authNotice">ログイン状態を確認しています。</div>

      <form id="loginForm" class="modal-form">
        <label class="field">
          <span class="field-label">メールアドレス</span>
          <input class="input" type="email" id="loginEmail" autocomplete="username" placeholder="name@example.com">
        </label>
        <label class="field">
          <span class="field-label">パスワード</span>
          <input class="input" type="password" id="loginPassword" autocomplete="current-password" placeholder="10文字以上">
        </label>
        <button type="submit" class="btn btn-primary" id="loginSubmit">ログイン</button>
      </form>

      <form id="setupForm" class="modal-form" hidden>
        <label class="field">
          <span class="field-label">管理者名</span>
          <input class="input" type="text" id="setupName" autocomplete="name" placeholder="田中 太郎">
        </label>
        <label class="field">
          <span class="field-label">メールアドレス</span>
          <input class="input" type="email" id="setupEmail" autocomplete="email" placeholder="admin@example.com">
        </label>
        <label class="field">
          <span class="field-label">初期パスワード</span>
          <input class="input" type="password" id="setupPassword" autocomplete="new-password" placeholder="英字と数字を含む 10 文字以上">
        </label>
        <label class="field">
          <span class="field-label">確認用パスワード</span>
          <input class="input" type="password" id="setupPasswordConfirm" autocomplete="new-password" placeholder="もう一度入力">
        </label>
        <button type="submit" class="btn btn-primary" id="setupSubmit">管理者アカウントを作成</button>
      </form>

      <div class="auth-meta" id="authMeta"></div>
    </section>
  </div>
</div>
