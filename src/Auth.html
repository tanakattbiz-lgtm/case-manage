<div class="auth-shell" id="authShell">
  <div class="auth-layout">
    <section class="auth-hero">
      <div class="auth-hero-inner">
        <div class="brand-mark">
          <span class="brand-mark-badge">
            <svg class="icon icon-20" aria-hidden="true"><use href="#icon-dashboard"></use></svg>
          </span>
          <div>
            <div class="overline">案件管理</div>
            <h1>案件管理を、毎日使いやすい画面へ。</h1>
          </div>
        </div>

        <p class="auth-lead">メールアドレスとパスワードでログインし、案件と顧客情報を確認できます。</p>

        <div class="auth-hero-grid">
          <article class="info-tile">
            <span class="info-tile-icon">
              <svg class="icon icon-20" aria-hidden="true"><use href="#icon-folder"></use></svg>
            </span>
            <strong>案件をすぐ検索</strong>
            <p>一覧から詳細まで同じ流れで操作できます。</p>
          </article>
          <article class="info-tile">
            <span class="info-tile-icon">
              <svg class="icon icon-20" aria-hidden="true"><use href="#icon-users"></use></svg>
            </span>
            <strong>顧客情報を一元管理</strong>
            <p>担当者や連絡先をすぐ確認できます。</p>
          </article>
          <article class="info-tile">
            <span class="info-tile-icon">
              <svg class="icon icon-20" aria-hidden="true"><use href="#icon-wifi"></use></svg>
            </span>
            <strong>必要な情報をすぐ確認</strong>
            <p>業務で必要な情報だけを表示します。</p>
          </article>
        </div>
      </div>
    </section>

    <section class="auth-panel surface">
      <div class="auth-panel-head">
        <div class="overline" id="authEyebrow">ログイン</div>
        <h2 id="authTitle">ログイン</h2>
        <p id="authSubtitle">メールアドレスとパスワードを入力してください。</p>
      </div>

      <div class="inline-notice info" id="authNotice">
        <svg class="icon icon-16" aria-hidden="true"><use href="#icon-info"></use></svg>
        <span>ログイン状態を確認しています。</span>
      </div>

      <form id="loginForm" class="form-stack">
        <label class="field">
          <span class="field-label">メールアドレス <span class="required-dot">必須</span></span>
          <input class="input" type="email" id="loginEmail" autocomplete="username" placeholder="name@example.com">
          <span class="field-error" data-field-error="loginEmail"></span>
        </label>
        <label class="field">
          <span class="field-label">パスワード <span class="required-dot">必須</span></span>
          <input class="input" type="password" id="loginPassword" autocomplete="current-password" placeholder="10文字以上">
          <span class="field-error" data-field-error="loginPassword"></span>
        </label>
        <button type="submit" class="btn btn-primary btn-block" id="loginSubmit">
          <svg class="icon icon-16" aria-hidden="true"><use href="#icon-lock"></use></svg>
          <span>ログインする</span>
        </button>
      </form>

      <form id="setupForm" class="form-stack" hidden>
        <label class="field">
          <span class="field-label">管理者名 <span class="required-dot">必須</span></span>
          <input class="input" type="text" id="setupName" autocomplete="name" placeholder="田中 太郎">
          <span class="field-error" data-field-error="setupName"></span>
        </label>
        <label class="field">
          <span class="field-label">メールアドレス <span class="required-dot">必須</span></span>
          <input class="input" type="email" id="setupEmail" autocomplete="email" placeholder="admin@example.com">
          <span class="field-error" data-field-error="setupEmail"></span>
        </label>
        <label class="field">
          <span class="field-label">初期パスワード <span class="required-dot">必須</span></span>
          <input class="input" type="password" id="setupPassword" autocomplete="new-password" placeholder="英字と数字を含む 10 文字以上">
          <span class="field-error" data-field-error="setupPassword"></span>
        </label>
        <label class="field">
          <span class="field-label">確認用パスワード <span class="required-dot">必須</span></span>
          <input class="input" type="password" id="setupPasswordConfirm" autocomplete="new-password" placeholder="もう一度入力">
          <span class="field-error" data-field-error="setupPasswordConfirm"></span>
        </label>
        <button type="submit" class="btn btn-primary btn-block" id="setupSubmit">
          <svg class="icon icon-16" aria-hidden="true"><use href="#icon-save"></use></svg>
          <span>管理者アカウントを作成する</span>
        </button>
      </form>

      <div class="auth-meta" id="authMeta" hidden></div>
    </section>
  </div>
</div>
