<div class="modal-shell" id="projectModal" hidden>
  <div class="modal-panel">
    <div class="modal-head">
      <div>
        <h3 id="projectModalTitle">案件を追加</h3>
        <p>必要な項目を入力して保存してください。利益が未入力の場合は自動で計算されます。</p>
      </div>
      <button class="btn btn-ghost" type="button" data-close-modal="projectModal">閉じる</button>
    </div>

    <form class="modal-form" id="projectForm">
      <input type="hidden" id="projectId">
      <label class="field">
        <span class="field-label">案件名</span>
        <input class="input" type="text" id="projectName" placeholder="例: LP 制作">
      </label>

      <div class="modal-grid">
        <label class="field">
          <span class="field-label">クライアント</span>
          <select class="select" id="projectClientId"></select>
          <span class="field-hint">未登録の場合はクライアント画面で先に追加してください。</span>
        </label>
        <label class="field">
          <span class="field-label">ステータス</span>
          <select class="select" id="projectStatus">
            <option>商談中</option>
            <option>進行中</option>
            <option>完了</option>
            <option>停止</option>
            <option>保留</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">完了日</span>
          <input class="input" type="date" id="projectCompletedAt">
        </label>
        <label class="field">
          <span class="field-label">売上</span>
          <input class="input" type="number" min="0" id="projectSales" placeholder="300000">
        </label>
        <label class="field">
          <span class="field-label">利益</span>
          <input class="input" type="number" min="0" id="projectProfit" placeholder="空欄なら自動計算">
          <span class="field-hint" id="projectProfitHint">クライアントの既定利益率がある場合は自動で反映されます。</span>
        </label>
      </div>

      <label class="field">
        <span class="field-label">備考</span>
        <textarea class="textarea" id="projectNote" placeholder="URL、メモ、次回アクションなど"></textarea>
      </label>

      <div class="modal-actions">
        <button class="btn btn-secondary" type="button" data-close-modal="projectModal">キャンセル</button>
        <button class="btn btn-primary" type="submit" id="projectSubmit">保存する</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-shell" id="clientModal" hidden>
  <div class="modal-panel">
    <div class="modal-head">
      <div>
        <h3 id="clientModalTitle">クライアントを追加</h3>
        <p>案件で参照しやすいよう、表示名や連絡先、既定利益率を登録できます。</p>
      </div>
      <button class="btn btn-ghost" type="button" data-close-modal="clientModal">閉じる</button>
    </div>

    <form class="modal-form" id="clientForm">
      <input type="hidden" id="clientId">
      <label class="field">
        <span class="field-label">クライアント名</span>
        <input class="input" type="text" id="clientName" placeholder="株式会社サンプル">
      </label>

      <div class="modal-grid">
        <label class="field">
          <span class="field-label">担当者</span>
          <input class="input" type="text" id="clientContactName" placeholder="田中 太郎">
        </label>
        <label class="field">
          <span class="field-label">メール</span>
          <input class="input" type="email" id="clientEmail" placeholder="info@example.com">
        </label>
        <label class="field">
          <span class="field-label">電話</span>
          <input class="input" type="text" id="clientPhone" placeholder="03-0000-0000">
        </label>
        <label class="field">
          <span class="field-label">既定利益率 (%)</span>
          <input class="input" type="number" min="0" step="0.1" id="clientDefaultProfitRate" placeholder="30">
        </label>
      </div>

      <label class="field">
        <span class="field-label">備考</span>
        <textarea class="textarea" id="clientNote" placeholder="運用メモや請求条件など"></textarea>
      </label>

      <div class="modal-actions">
        <button class="btn btn-secondary" type="button" data-close-modal="clientModal">キャンセル</button>
        <button class="btn btn-primary" type="submit" id="clientSubmit">保存する</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-shell" id="userModal" hidden>
  <div class="modal-panel">
    <div class="modal-head">
      <div>
        <h3 id="userModalTitle">ユーザーを追加</h3>
        <p>ユーザーの追加や権限変更は管理者のみ行えます。必要に応じて利用停止やパスワード再設定も行えます。</p>
      </div>
      <button class="btn btn-ghost" type="button" data-close-modal="userModal">閉じる</button>
    </div>

    <form class="modal-form" id="userForm">
      <input type="hidden" id="userId">
      <label class="field">
        <span class="field-label">氏名</span>
        <input class="input" type="text" id="userName" placeholder="田中 太郎">
      </label>
      <label class="field">
        <span class="field-label">メールアドレス</span>
        <input class="input" type="email" id="userEmail" placeholder="member@example.com">
      </label>

      <div class="modal-grid">
        <label class="field">
          <span class="field-label">ロール</span>
          <select class="select" id="userRole">
            <option value="admin">管理者</option>
            <option value="editor">編集者</option>
            <option value="viewer">閲覧者</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">状態</span>
          <select class="select" id="userStatus">
            <option value="active">有効</option>
            <option value="disabled">無効</option>
          </select>
        </label>
      </div>

      <label class="field">
        <span class="field-label" id="userPasswordLabel">初期パスワード</span>
        <input class="input" type="password" id="userPassword" placeholder="編集時は空欄で据え置き">
      </label>

      <label class="field">
        <span class="field-label">追加オプション</span>
        <label><input type="checkbox" id="userUnlock"> ロック状態と失敗回数を解除する</label>
      </label>

      <div class="modal-actions">
        <button class="btn btn-secondary" type="button" data-close-modal="userModal">キャンセル</button>
        <button class="btn btn-primary" type="submit" id="userSubmit">保存する</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-shell" id="passwordModal" hidden>
  <div class="modal-panel">
    <div class="modal-head">
      <div>
        <h3>パスワード変更</h3>
        <p>変更後は他セッションを失効させ、再ログインを促します。</p>
      </div>
      <button class="btn btn-ghost" type="button" data-close-modal="passwordModal">閉じる</button>
    </div>

    <form class="modal-form" id="passwordForm">
      <label class="field">
        <span class="field-label">現在のパスワード</span>
        <input class="input" type="password" id="passwordCurrent" autocomplete="current-password">
      </label>
      <label class="field">
        <span class="field-label">新しいパスワード</span>
        <input class="input" type="password" id="passwordNext" autocomplete="new-password" placeholder="英字と数字を含む 10 文字以上">
      </label>
      <label class="field">
        <span class="field-label">確認用パスワード</span>
        <input class="input" type="password" id="passwordConfirm" autocomplete="new-password">
      </label>

      <div class="modal-actions">
        <button class="btn btn-secondary" type="button" data-close-modal="passwordModal">キャンセル</button>
        <button class="btn btn-primary" type="submit" id="passwordSubmit">更新する</button>
      </div>
    </form>
  </div>
</div>
